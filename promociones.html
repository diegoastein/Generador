<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoMonitor | Editor de Casos 1:1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; }
        input, textarea, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
        input:focus, textarea:focus, select:focus { border-color: #3b82f6 !important; }
        .active-tab { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
        .glass-card { background: rgba(15,23,42,0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0f172a; } ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback } = React;

const SCENARIOS_BASE = {
    brady: {
        title: "Bradicardia Severa",
        steps: [
            {t:"Desafío Clínico",   d:"Recién nacido con FC < 60 lpm tras pasos iniciales de estabilización en sala de partos.", v:null},
            {t:"Monitor en Alerta", d:"Se detecta caída sostenida de la frecuencia y saturación pre-ductal crítica.", v:{hr:55,sp:72}},
            {t:"Conducta (NRP)",    d:"Inicio inmediato de VPP efectiva. Evaluación de técnica MR. SOPA.", v:{hr:58,sp:70}},
            {t:"Evolución",         d:"Mejora de la ventilación resulta en ascenso de la frecuencia cardiaca por encima de 100.", v:{hr:115,sp:88}},
            {t:"Entrenamiento",     d:"Domina la reanimación neonatal con los escenarios de NeoMonitor Expert.", v:null}
        ]
    },
    pneumo: {
        title: "Neumotórax a Tensión",
        steps: [
            {t:"Deterioro Súbito", d:"Bebé en asistencia respiratoria mecánica presenta desaturación brusca y cianosis.", v:null},
            {t:"Signos Críticos",  d:"Taquicardia compensatoria con caída de la saturación de oxígeno.", v:{hr:185,sp:74}},
            {t:"Diagnóstico",      d:"Sospechar ante ruidos asimétricos y tórax abombado.", v:{hr:190,sp:72}},
            {t:"Intervención",     d:"Descompresión inmediata con aguja en segundo espacio intercostal.", v:{hr:160,sp:85}},
            {t:"Simulación",       d:"NeoMonitor: Alta fidelidad para decisiones en segundos críticos.", v:null}
        ]
    },
    sepsis: {
        title: "Shock Séptico",
        steps: [
            {t:"Caso Infeccioso",  d:"RN con factores de riesgo de sepsis presenta inestabilidad térmica y taquipnea.", v:null},
            {t:"Inestabilidad",    d:"Taquicardia sostenida y perfusión periférica disminuida (relleno > 3 seg).", v:{hr:188,sp:94}},
            {t:"Monitorización",   d:"Tendencia a la hipotensión y necesidad de soporte inotrópico.", v:{hr:195,sp:90}},
            {t:"Conducta",         d:"Carga de fluidos (10 ml/kg) y cobertura antibiótica de amplio espectro.", v:{hr:175,sp:92}},
            {t:"Optimización",     d:"Mejora tus protocolos de respuesta con simulación avanzada.", v:null}
        ]
    }
};

// ─── Helpers de texto ────────────────────────────────────────────────────────
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    let lines = [];
    for (let w of words) {
        const test = line ? line + ' ' + w : w;
        if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = w;
        } else { line = test; }
    }
    if (line) lines.push(line);
    for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], x, y + i * lineHeight);
    }
    return lines.length;
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
}

// ─── Renderizador de diapositivas con Canvas API ─────────────────────────────
function renderSlideToCanvas(canvas, step, slideIndex) {
    const SIZE = 1080;
    canvas.width  = SIZE;
    canvas.height = SIZE;
    const ctx = canvas.getContext('2d');

    // Fondo principal
    ctx.fillStyle = '#020617';
    ctx.fillRect(0, 0, SIZE, SIZE);

    // Grid de puntos
    ctx.fillStyle = '#1e293b';
    for (let gx = 20; gx < SIZE; gx += 40) {
        for (let gy = 20; gy < SIZE; gy += 40) {
            ctx.beginPath();
            ctx.arc(gx, gy, 1, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    const PAD = 80;

    // ── Título ──
    const titleY = PAD + 40;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 88px Inter, sans-serif';
    ctx.textBaseline = 'top';
    const titleText = step.t || 'Sin título';
    const titleLines = wrapText(ctx, titleText.toUpperCase(), PAD, titleY, SIZE - PAD * 2, 92);

    // ── Tarjeta de contenido ──
    const cardY = titleY + titleLines * 92 + 32;
    const cardH = step.v ? 460 : 320;
    const cardW = SIZE - PAD * 2;

    roundRect(ctx, PAD, cardY, cardW, cardH, 60);
    ctx.fillStyle = '#0f172a';
    ctx.fill();
    roundRect(ctx, PAD, cardY, cardW, cardH, 60);
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Glow decorativo
    const grd = ctx.createRadialGradient(PAD + 100, cardY + 100, 0, PAD + 100, cardY + 100, 400);
    grd.addColorStop(0, 'rgba(37,99,235,0.12)');
    grd.addColorStop(1, 'transparent');
    roundRect(ctx, PAD, cardY, cardW, cardH, 60);
    ctx.fillStyle = grd;
    ctx.fill();

    // Texto descripción
    const descX = PAD + 60;
    const descY = cardY + 60;
    const descMaxW = cardW - 120;
    ctx.fillStyle = '#e2e8f0';
    ctx.font = '400 42px Inter, sans-serif';
    ctx.textBaseline = 'top';
    wrapText(ctx, step.d || '', descX, descY, descMaxW, 58);

    // ── Vitales ──
    if (step.v) {
        const vitalsY = cardY + cardH - 260;
        const col1X = descX;
        const col2X = descX + 380;

        // FC
        ctx.fillStyle = '#22c55e';
        ctx.font = 'bold 26px Inter, sans-serif';
        ctx.textBaseline = 'top';
        ctx.fillText('FRECUENCIA CARDIACA', col1X, vitalsY);
        ctx.font = 'bold 160px Inter, sans-serif';
        ctx.fillText(String(step.v.hr || '--'), col1X, vitalsY + 30);

        // SpO2
        ctx.fillStyle = '#facc15';
        ctx.font = 'bold 26px Inter, sans-serif';
        ctx.fillText('SATURACIÓN O₂', col2X, vitalsY);
        ctx.font = 'bold 160px Inter, sans-serif';
        ctx.fillText(String(step.v.sp || '--'), col2X, vitalsY + 30);
        ctx.font = 'bold 72px Inter, sans-serif';
        const spW = ctx.measureText(String(step.v.sp || '--')).width;
        ctx.fillText('%', col2X + spW + 8, vitalsY + 110);
    }

    // ── Footer ──
    const footerY = SIZE - PAD - 60;
    ctx.fillStyle = '#475569';
    ctx.font = 'bold 28px Inter, sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillText('neomonitor.pro', PAD + 10, footerY);
    ctx.fillStyle = '#1e293b';
    ctx.font = 'bold 18px Inter, sans-serif';
    ctx.fillText('SIMULACIÓN MÉDICA AVANZADA', PAD + 10, footerY + 38);


}

// ─── Preview visual de diapositiva (SVG simplificado) ────────────────────────
const SlidePreview = ({ step, index }) => (
    <div className="w-full aspect-square bg-slate-950 rounded-2xl overflow-hidden relative select-none border border-white/5 flex flex-col p-5"
         style={{fontFamily:'Inter,sans-serif', background:'#020617'}}>
        <h2 className="text-white font-black uppercase leading-none mb-3" style={{fontSize:'clamp(14px,3.5vw,22px)'}}>{step.t || 'Sin título'}</h2>
        <div className="flex-1 bg-slate-900 rounded-2xl p-4 border border-white/5 flex flex-col justify-center">
            <p className="text-slate-300 text-xs leading-relaxed">{step.d}</p>
            {step.v && (
                <div className="flex gap-6 mt-3">
                    <div>
                        <p className="text-green-500 text-[8px] font-black uppercase tracking-widest">FC</p>
                        <p className="text-green-500 font-black text-3xl leading-none">{step.v.hr}</p>
                    </div>
                    <div>
                        <p className="text-yellow-400 text-[8px] font-black uppercase tracking-widest">SpO₂</p>
                        <p className="text-yellow-400 font-black text-3xl leading-none">{step.v.sp}<span className="text-base">%</span></p>
                    </div>
                </div>
            )}
        </div>
        <div className="mt-2 flex justify-between items-end">
            <p className="text-slate-600 text-[8px] font-bold uppercase tracking-widest">neomonitor.pro</p>
        </div>
    </div>
);

// ─── App principal ────────────────────────────────────────────────────────────
const App = () => {
    const [activeSlide, setActiveSlide] = useState(0);
    const [scenario, setScenario] = useState({
        title: "Nuevo Escenario",
        steps: Array(5).fill(null).map(() => ({ t:"", d:"", v:null }))
    });
    const [isGenerating, setIsGenerating] = useState(false);
    const [gallery, setGallery] = useState([]);
    const [status, setStatus] = useState('');

    const loadScenario = (key) => {
        if (!key) return;
        const base = SCENARIOS_BASE[key];
        setScenario({ title: base.title, steps: JSON.parse(JSON.stringify(base.steps)) });
        setActiveSlide(0);
        setGallery([]);
    };

    const updateSlide = (field, value) => {
        const newSteps = [...scenario.steps];
        if (field === 'hr' || field === 'sp') {
            if (!newSteps[activeSlide].v) newSteps[activeSlide].v = { hr:"", sp:"" };
            newSteps[activeSlide].v[field] = value;
        } else {
            newSteps[activeSlide][field] = value;
        }
        setScenario({ ...scenario, steps: newSteps });
    };

    const generateImages = async () => {
        setIsGenerating(true);
        setGallery([]);
        const images = [];

        for (let i = 0; i < 5; i++) {
            setStatus(`Generando diapositiva ${i+1}/5…`);
            await new Promise(r => setTimeout(r, 30));
            const canvas = document.createElement('canvas');
            renderSlideToCanvas(canvas, scenario.steps[i], i);
            images.push(canvas.toDataURL('image/png'));
        }

        setGallery(images);
        setStatus('');
        setIsGenerating(false);
    };

    const currentStep = scenario.steps[activeSlide];

    return (
        <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col md:flex-row overflow-hidden">

            {/* Sidebar */}
            <aside className="w-full md:w-72 bg-slate-900/50 border-r border-white/5 p-6 flex flex-col items-center md:items-start shrink-0">
                <div className="flex items-center gap-3 mb-12">
                    <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-blue-500/40">NM</div>
                    <span className="font-black text-xl tracking-tighter uppercase">Expert Suite</span>
                </div>
                <nav className="w-full">
                    <div className="p-4 rounded-2xl bg-blue-600/10 border border-blue-500/30 flex items-center gap-4 text-blue-400">
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                        <span className="font-bold text-sm">Casos 1:1 Post</span>
                    </div>
                </nav>
                <div className="mt-auto hidden md:block pt-8 border-t border-white/5 w-full">
                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Editor de Contenido v3.0</p>
                </div>
            </aside>

            {/* Contenido */}
            <main className="flex-1 p-6 md:p-12 overflow-y-auto">
                <header className="mb-10 max-w-6xl mx-auto">
                    <div className="flex flex-col md:flex-row md:items-center gap-4 mb-2">
                        <h2 className="text-4xl font-black tracking-tight uppercase">Editor de <span className="text-blue-500">Casos</span></h2>
                        <div className="bg-blue-500/20 text-blue-500 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase inline-block w-fit">Post HD 1:1</div>
                    </div>
                    <p className="text-slate-400">Diseña diapositivas para tus redes sociales con precisión técnica y estética médica.</p>
                </header>

                <div className="grid lg:grid-cols-12 gap-8 max-w-6xl mx-auto items-start">

                    {/* Panel de edición */}
                    <div className="lg:col-span-5 space-y-6">

                        {/* Preview live */}
                        <div className="rounded-[24px] overflow-hidden border border-white/5 shadow-2xl">
                            <SlidePreview step={currentStep} index={activeSlide} />
                        </div>

                        <div className="glass-card p-6 rounded-[32px] space-y-6">
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Escenario Maestro</label>
                                <select onChange={(e) => loadScenario(e.target.value)} className="w-full rounded-xl p-4 text-sm font-bold cursor-pointer">
                                    <option value="">-- Nuevo Documento --</option>
                                    <option value="brady">Bradicardia NRP</option>
                                    <option value="pneumo">Neumotórax UCIN</option>
                                    <option value="sepsis">Shock Séptico</option>
                                </select>
                            </div>

                            <div className="space-y-4 pt-4 border-t border-white/5">
                                <div className="flex bg-slate-950 rounded-xl p-1">
                                    {[0,1,2,3,4].map(i => (
                                        <button key={i} onClick={() => setActiveSlide(i)}
                                            className={`flex-1 py-3 text-[10px] font-black uppercase rounded-lg transition-all ${activeSlide === i ? 'active-tab' : 'text-slate-500 hover:text-slate-300'}`}>
                                            S{i+1}
                                        </button>
                                    ))}
                                </div>

                                <div className="space-y-3">
                                    <input type="text" placeholder="Título de diapositiva"
                                        value={currentStep.t}
                                        onChange={(e) => updateSlide('t', e.target.value)}
                                        className="w-full rounded-xl p-4 text-sm font-bold" />
                                    <textarea placeholder="Descripción del caso..." rows={4}
                                        value={currentStep.d}
                                        onChange={(e) => updateSlide('d', e.target.value)}
                                        className="w-full rounded-xl p-4 text-sm resize-none" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-bold text-slate-600 uppercase ml-1 tracking-widest">FC (bpm)</label>
                                            <input type="text" placeholder="--"
                                                value={currentStep.v?.hr || ""}
                                                onChange={(e) => updateSlide('hr', e.target.value)}
                                                className="w-full rounded-xl p-4 text-sm font-black text-green-500 text-center" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-bold text-slate-600 uppercase ml-1 tracking-widest">SpO₂ (%)</label>
                                            <input type="text" placeholder="--"
                                                value={currentStep.v?.sp || ""}
                                                onChange={(e) => updateSlide('sp', e.target.value)}
                                                className="w-full rounded-xl p-4 text-sm font-black text-yellow-500 text-center" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <button onClick={generateImages} disabled={isGenerating}
                                className="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-600/20 transition-all flex items-center justify-center gap-3 uppercase tracking-widest text-xs">
                                {isGenerating
                                    ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"/><span>{status}</span></>
                                    : <><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg><span>Renderizar Imágenes</span></>}
                            </button>
                        </div>
                    </div>

                    {/* Galería */}
                    <div className="lg:col-span-7">
                        {gallery.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">
                                {gallery.map((img, i) => (
                                    <div key={i} className="group relative rounded-3xl border border-white/5 overflow-hidden shadow-2xl transition-all hover:scale-[1.02]">
                                        <img src={img} alt={`Slide ${i+1}`} className="w-full aspect-square object-cover" />
                                        <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all duration-300">
                                            <a href={img} download={`NeoMonitor_Caso_Slide_${i+1}.png`}
                                               className="bg-white text-black p-4 rounded-full shadow-2xl transform active:scale-95">
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                            </a>
                                        </div>
                                        <div className="absolute top-4 right-4 bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest shadow-lg">
                                            DIAPOSITIVA {i+1}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="border-2 border-dashed border-slate-800 rounded-[40px] aspect-square flex flex-col items-center justify-center text-slate-700 p-12 text-center">
                                <svg className="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="10" ry="10"/><path d="M12 8v8M8 12h8"/></svg>
                                <p className="text-xs font-bold uppercase tracking-widest leading-relaxed">
                                    Completá los campos y presioná<br/><span className="text-blue-600">Renderizar Imágenes</span>
                                </p>
                            </div>
                        )}
                    </div>
                </div>
            </main>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

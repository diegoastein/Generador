<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoMonitor | Editor de Casos 1:1</title>
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        .medical-grid { 
            background-image: radial-gradient(#1e293b 1px, transparent 1px); 
            background-size: 40px 40px; 
        }

        /* Estilo para el motor de renderizado (Oculto para el usuario, visible para html2canvas) */
        #render-target {
            position: fixed;
            top: 0;
            left: 0;
            width: 1080px;
            height: 1080px;
            z-index: -5000;
            visibility: visible;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input, textarea, select {
            background: #0f172a !important;
            border: 1px solid #1e293b !important;
            color: white !important;
            outline: none;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #3b82f6 !important;
        }

        .active-tab {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const SCENARIOS_BASE = {
            brady: { 
                title: "Bradicardia Severa", 
                steps: [
                    {t:"Desafío Clínico", d:"Recién nacido con FC < 60 lpm tras pasos iniciales de estabilización en sala de partos.", v:null},
                    {t:"Monitor en Alerta", d:"Se detecta caída sostenida de la frecuencia y saturación pre-ductal crítica.", v:{hr:55, sp:72}},
                    {t:"Conducta (NRP)", d:"Inicio inmediato de VPP efectiva. Evaluación de técnica MR. SOPA.", v:{hr:58, sp:70}},
                    {t:"Evolución", d:"Mejora de la ventilación resulta en ascenso de la frecuencia cardiaca por encima de 100.", v:{hr:115, sp:88}},
                    {t:"Entrenamiento", d:"Domina la reanimación neonatal con los escenarios de NeoMonitor Expert.", v:null}
                ] 
            },
            pneumo: { 
                title: "Neumotórax a Tensión", 
                steps: [
                    {t:"Deterioro Súbito", d:"Bebé en asistencia respiratoria mecánica presenta desaturación brusca y cianosis.", v:null},
                    {t:"Signos Críticos", d:"Taquicardia compensatoria con caída de la saturación de oxígeno.", v:{hr:185, sp:74}},
                    {t:"Diagnóstico", d:"Sospechar ante ruidos asimétricos y tórax abombado.", v:{hr:190, sp:72}},
                    {t:"Intervención", d:"Descompresión inmediata con aguja en segundo espacio intercostal.", v:{hr:160, sp:85}},
                    {t:"Simulación", d:"NeoMonitor: Alta fidelidad para decisiones en segundos críticos.", v:null}
                ] 
            },
            sepsis: { 
                title: "Shock Séptico", 
                steps: [
                    {t:"Caso Infeccioso", d:"RN con factores de riesgo de sepsis presenta inestabilidad térmica y taquipnea.", v:null},
                    {t:"Inestabilidad", d:"Taquicardia sostenida y perfusión periférica disminuida (relleno > 3 seg).", v:{hr:188, sp:94}},
                    {t:"Monitorización", d:"Tendencia a la hipotensión y necesidad de soporte inotrópico.", v:{hr:195, sp:90}},
                    {t:"Conducta", d:"Carga de fluidos (10ml/kg) y cobertura antibiótica de amplio espectro.", v:{hr:175, sp:92}},
                    {t:"Optimización", d:"Mejora tus protocolos de respuesta con simulación avanzada.", v:null}
                ] 
            }
        };

        const App = () => {
            const [activeSlide, setActiveSlide] = useState(0);
            const [scenario, setScenario] = useState({
                title: "Nuevo Escenario",
                steps: Array(5).fill(null).map(() => ({ t: "", d: "", v: null }))
            });
            const [isGenerating, setIsGenerating] = useState(false);
            const [gallery, setGallery] = useState([]);
            
            const renderRef = useRef(null);

            // Inicializar iconos de Lucide
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            const loadScenario = (key) => {
                if (!key) return;
                const base = SCENARIOS_BASE[key];
                setScenario({
                    title: base.title,
                    steps: JSON.parse(JSON.stringify(base.steps))
                });
                setActiveSlide(0);
            };

            const updateSlide = (field, value) => {
                const newSteps = [...scenario.steps];
                if (field === 'hr' || field === 'sp') {
                    if (!newSteps[activeSlide].v) newSteps[activeSlide].v = { hr: "", sp: "" };
                    newSteps[activeSlide].v[field] = value;
                } else {
                    newSteps[activeSlide][field] = value;
                }
                setScenario({ ...scenario, steps: newSteps });
            };

            const captureSlides = async () => {
                setIsGenerating(true);
                const newGallery = [];

                for (let i = 0; i < 5; i++) {
                    setActiveSlide(i);
                    // Buffer de renderizado para asegurar que el DOM y Lucide se actualicen
                    await new Promise(r => setTimeout(r, 200)); 

                    try {
                        const canvas = await html2canvas(renderRef.current, {
                            scale: 1, // 1:1 real para 1080x1080
                            width: 1080,
                            height: 1080,
                            backgroundColor: '#020617',
                            useCORS: true,
                            logging: false
                        });
                        newGallery.push(canvas.toDataURL("image/png"));
                    } catch (err) {
                        console.error("Error capturando diapositiva:", err);
                    }
                }

                setGallery(newGallery);
                setIsGenerating(false);
            };

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col md:flex-row overflow-hidden">
                    
                    {/* Sidebar */}
                    <aside className="w-full md:w-72 bg-slate-900/50 border-r border-white/5 p-6 flex flex-col items-center md:items-start shrink-0 backdrop-blur-xl">
                        <div className="flex items-center gap-3 mb-12">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-blue-500/40">NM</div>
                            <span className="font-black text-xl tracking-tighter uppercase">Expert Suite</span>
                        </div>
                        
                        <nav className="space-y-3 w-full">
                            <div className="p-4 rounded-2xl bg-blue-600/10 border border-blue-500/30 flex items-center gap-4 text-blue-500">
                                <i data-lucide="layout" className="w-5 h-5"></i>
                                <span className="font-bold text-sm">Casos 1:1 Post</span>
                            </div>
                        </nav>
                        
                        <div className="mt-auto hidden md:block pt-8 border-t border-white/5 w-full">
                            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Editor de Contenido v2.5</p>
                        </div>
                    </aside>

                    {/* Contenido Principal */}
                    <main className="flex-1 p-6 md:p-12 overflow-y-auto">
                        <header className="mb-10 max-w-6xl mx-auto">
                            <div className="flex flex-col md:flex-row md:items-center gap-4 mb-2">
                                <h2 className="text-4xl font-black tracking-tight uppercase">Editor de <span className="text-blue-500">Casos</span></h2>
                                <div className="bg-blue-500/20 text-blue-500 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase inline-block w-fit">Post HD 1:1</div>
                            </div>
                            <p className="text-slate-400">Diseña diapositivas para tus redes sociales con precisión técnica y estética médica.</p>
                        </header>

                        <div className="grid lg:grid-cols-12 gap-8 max-w-6xl mx-auto items-start">
                            
                            {/* Panel de Edición */}
                            <div className="lg:col-span-5 space-y-6">
                                <div className="glass-card p-6 rounded-[32px] space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Escenario Maestro</label>
                                        <select 
                                            onChange={(e) => loadScenario(e.target.value)}
                                            className="w-full rounded-xl p-4 text-sm font-bold cursor-pointer"
                                        >
                                            <option value="">-- Nuevo Documento --</option>
                                            <option value="brady">Bradicardia NRP</option>
                                            <option value="pneumo">Neumotórax UCIN</option>
                                            <option value="sepsis">Shock Séptico</option>
                                        </select>
                                    </div>

                                    <div className="space-y-4 pt-4 border-t border-white/5">
                                        <div className="flex bg-slate-950 rounded-xl p-1">
                                            {[0,1,2,3,4].map(i => (
                                                <button 
                                                    key={i}
                                                    onClick={() => setActiveSlide(i)}
                                                    className={`flex-1 py-3 text-[10px] font-black uppercase rounded-lg transition-all ${activeSlide === i ? 'active-tab' : 'text-slate-500 hover:text-slate-300'}`}
                                                >
                                                    S{i+1}
                                                </button>
                                            ))}
                                        </div>

                                        <div className="space-y-3">
                                            <input 
                                                type="text" 
                                                placeholder="Título de diapositiva"
                                                value={scenario.steps[activeSlide].t}
                                                onChange={(e) => updateSlide('t', e.target.value)}
                                                className="w-full rounded-xl p-4 text-sm font-bold"
                                            />
                                            <textarea 
                                                placeholder="Descripción del caso..."
                                                rows={4}
                                                value={scenario.steps[activeSlide].d}
                                                onChange={(e) => updateSlide('d', e.target.value)}
                                                className="w-full rounded-xl p-4 text-sm resize-none"
                                            />
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-bold text-slate-600 uppercase ml-1 tracking-widest">FC (bpm)</label>
                                                    <input 
                                                        type="text" 
                                                        placeholder="--"
                                                        value={scenario.steps[activeSlide].v?.hr || ""}
                                                        onChange={(e) => updateSlide('hr', e.target.value)}
                                                        className="w-full rounded-xl p-4 text-sm font-black text-green-500 text-center"
                                                    />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-bold text-slate-600 uppercase ml-1 tracking-widest">SpO2 (%)</label>
                                                    <input 
                                                        type="text" 
                                                        placeholder="--"
                                                        value={scenario.steps[activeSlide].v?.sp || ""}
                                                        onChange={(e) => updateSlide('sp', e.target.value)}
                                                        className="w-full rounded-xl p-4 text-sm font-black text-yellow-500 text-center"
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <button 
                                        onClick={captureSlides}
                                        disabled={isGenerating}
                                        className="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-600/20 transition-all flex items-center justify-center gap-3 uppercase tracking-widest text-xs"
                                    >
                                        {isGenerating ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" /> : <i data-lucide="download" className="w-4 h-4"></i>}
                                        {isGenerating ? 'Generando...' : 'Renderizar Imágenes'}
                                    </button>
                                </div>
                            </div>

                            {/* Galería de Resultados */}
                            <div className="lg:col-span-7">
                                {gallery.length > 0 ? (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">
                                        {gallery.map((img, i) => (
                                            <div key={i} className="group relative rounded-3xl border border-white/5 overflow-hidden shadow-2xl transition-all hover:scale-[1.02]">
                                                <img src={img} alt={`Slide ${i+1}`} className="w-full aspect-square object-cover" />
                                                <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all duration-300">
                                                    <a href={img} download={`NM_Caso_Slide_${i+1}.png`} className="bg-white text-black p-4 rounded-full shadow-2xl transform active:scale-95">
                                                        <i data-lucide="download" className="w-6 h-6"></i>
                                                    </a>
                                                </div>
                                                <div className="absolute top-4 right-4 bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest shadow-lg">DIAPOSITIVA {i+1}</div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="border-2 border-dashed border-slate-800 rounded-[40px] aspect-square flex flex-col items-center justify-center text-slate-700 p-12 text-center">
                                        <i data-lucide="database" className="w-16 h-16 mb-4 opacity-20"></i>
                                        <p className="text-xs font-bold uppercase tracking-widest leading-relaxed">Las imágenes aparecerán aquí listas para descargar una vez renderizadas.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* MOTOR DE RENDERIZADO (Invisible pero presente para html2canvas) */}
                    <div 
                        id="render-target"
                        ref={renderRef}
                        className="bg-slate-950 flex flex-col justify-center medical-grid"
                    >
                        <div className="p-20 flex flex-col h-full justify-center">
                            <div className="mb-12">
                                <span className="bg-blue-600 text-white px-10 py-4 rounded-full text-3xl font-black uppercase tracking-[0.25em]">CASO CLÍNICO</span>
                            </div>
                            
                            <h1 className="text-[95px] font-black leading-[0.9] mb-14 text-white tracking-tighter uppercase">
                                {scenario.steps[activeSlide].t || scenario.title}
                            </h1>

                            <div className="bg-slate-900 border border-white/10 p-20 rounded-[80px] flex-1 flex flex-col justify-center relative overflow-hidden">
                                <div className="absolute -top-40 -left-40 w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[120px]"></div>
                                <p className="text-5xl leading-tight text-slate-100 font-medium relative z-10">
                                    {scenario.steps[activeSlide].d || "Explora este escenario clínico de alta fidelidad diseñado para expertos en neonatología."}
                                </p>

                                {scenario.steps[activeSlide].v && (
                                    <div className="mt-20 flex gap-24 relative z-10">
                                        <div>
                                            <p className="text-green-500 text-3xl font-black mb-4 uppercase tracking-widest">Frecuencia Cardiaca</p>
                                            <p className="text-[180px] font-black text-green-500 leading-none tabular-nums">
                                                {scenario.steps[activeSlide].v.hr}
                                            </p>
                                        </div>
                                        <div>
                                            <p className="text-yellow-400 text-3xl font-black mb-4 uppercase tracking-widest">Saturación O2</p>
                                            <p className="text-[180px] font-black text-yellow-400 leading-none tabular-nums">
                                                {scenario.steps[activeSlide].v.sp}<span className="text-[80px]">%</span>
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="mt-16 flex justify-between items-end px-10">
                                <div className="space-y-2">
                                    <p className="text-3xl font-bold text-slate-500 uppercase tracking-[0.4em]">neomonitor.pro</p>
                                    <p className="text-xl text-slate-700 font-bold uppercase tracking-widest">Simulación Médica Avanzada</p>
                                </div>
                                <div className="text-[140px] font-black text-slate-900 leading-none tracking-tighter tabular-nums">
                                    {activeSlide + 1}/5
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

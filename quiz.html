// ─── Canvas helpers ───────────────────────────────────────────────────────────
function rrect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
    if (!text) return 0;
    const words = text.split(' ');
    let line = '', lines = [];
    for (const w of words) {
        const test = line ? line+' '+w : w;
        if (ctx.measureText(test).width > maxW && line) { lines.push(line); line=w; }
        else line=test;
    }
    if (line) lines.push(line);
    lines.forEach((l,i) => ctx.fillText(l, x, y+i*lineH));
    return lines.length;
}

function drawQuizSlide(canvas, step, data) {
    const W=1080, H=1920;
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d');

    ctx.fillStyle='#020617'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#1e293b';
    for(let gx=30;gx<W;gx+=60) for(let gy=30;gy<H;gy+=60){
        ctx.beginPath(); ctx.arc(gx,gy,1.2,0,Math.PI*2); ctx.fill();
    }

    const P=90;
    rrect(ctx,W/2-60,P,120,120,28); ctx.fillStyle='#2563eb'; ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 52px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('NM',W/2,P+60); ctx.textAlign='left'; ctx.textBaseline='top';

    const cY=P+160, cH=H-cY-180, cW=W-P*2;
    rrect(ctx,P,cY,cW,cH,72); ctx.fillStyle='#0f172a'; ctx.fill();
    rrect(ctx,P,cY,cW,cH,72); ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=2; ctx.stroke();
    const grd=ctx.createRadialGradient(W-P,cY+200,0,W-P,cY+200,500);
    grd.addColorStop(0,'rgba(245,158,11,0.08)'); grd.addColorStop(1,'transparent');
    rrect(ctx,P,cY,cW,cH,72); ctx.fillStyle=grd; ctx.fill();

    const iX=P+72, iW=cW-144;
    let y=cY+80;

    if(step===0){
        ctx.fillStyle='#f59e0b'; ctx.font='bold 36px system-ui'; ctx.fillText('NUEVO DESAFÍO',iX,y); y+=70;
        ctx.fillStyle='#fff'; ctx.font='bold 108px system-ui';
        const tl=wrapText(ctx,data.title.toUpperCase(),iX,y,iW,112); y+=tl*112+60;
        ctx.fillStyle='#64748b'; ctx.font='400 46px system-ui';
        wrapText(ctx,'¿Estás listo para responder como un experto?',iX,y,iW,58);
    }

    if(step===1){
        rrect(ctx,iX,y,280,58,29); ctx.fillStyle='rgba(59,130,246,0.15)'; ctx.fill();
        ctx.fillStyle='#3b82f6'; ctx.font='bold 28px system-ui'; ctx.textBaseline='middle'; ctx.fillText('EL ESCENARIO',iX+24,y+29); ctx.textBaseline='top'; y+=90;
        ctx.fillStyle='#fff'; ctx.font='bold 52px system-ui'; wrapText(ctx,data.caseText,iX,y,iW,66);
    }

    if(step===2){
        rrect(ctx,iX,y,280,58,29); ctx.fillStyle='rgba(245,158,11,0.15)'; ctx.fill();
        ctx.fillStyle='#f59e0b'; ctx.font='bold 28px system-ui'; ctx.textBaseline='middle'; ctx.fillText('LA PREGUNTA',iX+24,y+29); ctx.textBaseline='top'; y+=90;
        ctx.fillStyle='#fff'; ctx.font='bold 52px system-ui';
        const ql=wrapText(ctx,data.question,iX,y,iW,64); y+=ql*64+55;
        const oc=['#2563eb','#7c3aed','#0891b2'];
        for(let i=0;i<data.options.length;i++){
            const optText=data.options[i];
            // Medir líneas de la opción para determinar altura del bloque
            ctx.font='bold 32px system-ui';
            const words=optText.split(' '); let line=''; let optLines=1;
            for(const w of words){
                const t=line?line+' '+w:w;
                if(ctx.measureText(t).width>iW-140&&line){optLines++;line=w;}else line=t;
            }
            const oH=Math.max(110, 60+optLines*42);
            rrect(ctx,iX,y,iW,oH,36); ctx.fillStyle='#020617'; ctx.fill();
            rrect(ctx,iX,y,iW,oH,36); ctx.strokeStyle='#1e293b'; ctx.lineWidth=2; ctx.stroke();
            ctx.fillStyle=oc[i]||'#3b82f6'; ctx.font='bold 32px system-ui'; ctx.textBaseline='top';
            ctx.fillText('0'+(i+1)+'.',iX+24,y+20);
            ctx.fillStyle='#cbd5e1'; ctx.font='bold 32px system-ui';
            wrapText(ctx,optText,iX+110,y+20,iW-130,42);
            ctx.textBaseline='top'; y+=oH+18;
        }
    }

    if(step===3){
        rrect(ctx,iX,y,340,58,29); ctx.fillStyle='rgba(34,197,94,0.15)'; ctx.fill();
        ctx.fillStyle='#22c55e'; ctx.font='bold 28px system-ui'; ctx.textBaseline='middle'; ctx.fillText('RESPUESTA TÉCNICA',iX+24,y+29); ctx.textBaseline='top'; y+=90;
        ctx.fillStyle='#22c55e'; ctx.font='bold 64px system-ui';
        const al=wrapText(ctx,data.answer,iX,y,iW,76); y+=al*76+30;
        ctx.fillStyle='#22c55e'; ctx.fillRect(iX,y,120,6); y+=50;
        ctx.fillStyle='#94a3b8'; ctx.font='400 42px system-ui'; wrapText(ctx,data.explanation,iX,y,iW,58);
    }

    // Badge NRP
    ctx.fillStyle='rgba(37,99,235,0.15)'; ctx.font='bold 22px system-ui';
    const badge='NRP · AHA/AAP 8ª ED.';
    const bw=ctx.measureText(badge).width+40;
    rrect(ctx,W/2-bw/2,H-P-90,bw,44,22); ctx.fill();
    ctx.fillStyle='#3b82f6'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(badge,W/2,H-P-68);

    ctx.fillStyle='#1e293b'; ctx.font='bold 28px system-ui'; ctx.textBaseline='middle';
    ctx.fillText('NEOMONITOR.PRO',W/2,H-P-30);

    const dW=48,dH=12,dG=16,total=(dW+dG)*4-dG;
    let dx=W/2-total/2;
    for(let d=0;d<4;d++){
        rrect(ctx,dx,H-P+10,dW,dH,6); ctx.fillStyle=d===step?'#f59e0b':'#1e293b'; ctx.fill(); dx+=dW+dG;
    }
    ctx.textAlign='left'; ctx.textBaseline='top';
}

// ─── Preview component ────────────────────────────────────────────────────────
function SlidePreview({ step, data }) {
    const ref=useRef(null);
    useEffect(()=>{ if(ref.current) drawQuizSlide(ref.current,step,data); },[step,data]);
    return <canvas ref={ref} style={{width:'100%',height:'auto',borderRadius:16,display:'block'}}/>;
}

// ─── App ──────────────────────────────────────────────────────────────────────

    const [generating, setGenerating] = useState(false);
    const [gallery, setGallery] = useState([]);
    const [status, setStatus] = useState('');
    const [data, setData] = useState({
        title:"Desafío Clínico",
        caseText:"Describe aquí el escenario...",
        question:"¿Qué conducta tomarías?",
        options:["Opción A","Opción B","Opción C"],
        answer:"Respuesta correcta",
        explanation:"Explica aquí la resolución técnica..."
    });

    const loadPreset=(key)=>{
        if(PRESETS[key]){ setData(PRESETS[key]); setActiveStep(0); setGallery([]); }
    };

    const updateField=(field,value,idx=null)=>{
        if(idx!==null){ const opts=[...data.options]; opts[idx]=value; setData(p=>({...p,options:opts})); }
        else setData(p=>({...p,[field]:value}));
    };

    const generate=async()=>{
        setGenerating(true); setGallery([]);
        const imgs=[];
        for(let i=0;i<4;i++){
            setStatus('Generando paso '+(i+1)+'/4…');
            await new Promise(r=>setTimeout(r,20));

            <aside className="w-72 bg-slate-900/50 border-r border-white/5 p-6 flex flex-col shrink-0">
                <div className="flex items-center gap-3 mb-12">

                </div>
                <nav>
                    <div className="p-4 rounded-2xl bg-amber-500/10 border border-amber-500/30 flex items-center gap-4 text-amber-400">
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                        <span className="font-bold text-sm">Interactive Quiz</span>
                    </div>
                </nav>
                <div className="mt-4 p-3 rounded-xl bg-blue-950/40 border border-blue-900/40">
                    <p className="text-[9px] text-blue-400 font-bold uppercase tracking-widest leading-relaxed">Basado en NRP<br/>AHA/AAP 8ª Ed. 2021<br/>+ Actualización 2023</p>
                </div>
                <div className="mt-auto pt-8 border-t border-white/5">
                    <p className="text-[10px] text-slate-600 font-bold uppercase tracking-widest">12 Presets NRP · v3.1</p>
                </div>
            </aside>

            <main className="flex-1 p-12 overflow-y-auto">
                <header className="mb-10 max-w-6xl mx-auto">
                    <h2 className="text-4xl font-black tracking-tight uppercase mb-2">NeoQuiz <span className="text-amber-500">Expert</span></h2>
                    <p className="text-slate-400 text-sm">12 presets NRP · Genera secuencias de 4 imágenes para Stories 9:16.</p>
                </header>

                <div className="grid lg:grid-cols-12 gap-8 max-w-6xl mx-auto items-start">
                    <div className="lg:col-span-5 space-y-6">
                        <div className="glass-card p-3 rounded-2xl">
                            <div className="flex gap-1 mb-3">
                                {['Portada','Escenario','Pregunta','Respuesta'].map((label,i)=>(
                                    <button key={i} onClick={()=>setActiveStep(i)}
                                        className={'flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition-all '+(activeStep===i?'bg-amber-500 text-white':'text-slate-500 hover:text-slate-300')}>
                                        {label}

                                <SlidePreview step={activeStep} data={data}/>
                            </div>

                                <select onChange={e=>loadPreset(e.target.value)} className={inp+" font-bold cursor-pointer"}>

                                        <option value="vpp_inicio">¿Cuándo Iniciar VPP?</option>
                                        <option value="fio2_termino">FiO₂ Inicial — RN de Término</option>

                                        <option value="sopa_steps">Pasos MR-SOPA</option>
                                        <option value="compresiones_indicacion">Indicación de Compresiones</option>
                                        <option value="epinefrina_via">Epinefrina: Vía y Dosis</option>

                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Título</label>
                                <input className={inp+" font-bold"} value={data.title} onChange={e=>updateField('title',e.target.value)} placeholder="Título del quiz"/>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Escenario clínico</label>
                                <textarea className={inp+" resize-none"} rows={3} value={data.caseText} onChange={e=>updateField('caseText',e.target.value)} placeholder="Caso clínico..."/>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-amber-600 uppercase tracking-widest mb-1 block">Pregunta</label>
                                <input className={inp+" font-bold"} style={{color:'#f59e0b'}} value={data.question} onChange={e=>updateField('question',e.target.value)} placeholder="¿Qué conducta tomarías?"/>
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block">Opciones de respuesta</label>
                                {data.options.map((opt,i)=>(
                                    <input key={i} className={inp} value={opt} onChange={e=>updateField('options',e.target.value,i)} placeholder={'Opción '+(i+1)}/>
                                ))}
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-green-600 uppercase tracking-widest mb-1 block">Respuesta correcta</label>
                                <input className={inp+" font-bold"} style={{color:'#22c55e'}} value={data.answer} onChange={e=>updateField('answer',e.target.value)} placeholder="Respuesta"/>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Explicación técnica</label>
                                <textarea className={inp+" resize-none"} rows={3} value={data.explanation} onChange={e=>updateField('explanation',e.target.value)} placeholder="Explicación técnica basada en NRP..."/>
                            </div>

                            <button onClick={generate} disabled={generating}
                                className="w-full bg-amber-600 hover:bg-amber-500 disabled:opacity-50 text-white font-black py-5 rounded-2xl shadow-xl transition-all uppercase tracking-widest text-xs flex items-center justify-center gap-3">
                                {generating
                                    ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"/>{status}</>
                                    : <><svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>Generar Pack de Stories</>}
                            </button>
                        </div>
                    </div>

                    <div className="lg:col-span-7">
                        {gallery.length>0
                            ? <div className="grid grid-cols-2 gap-4 fade-in">
                                {gallery.map((img,i)=>(
                                    <div key={i} className="group relative rounded-3xl overflow-hidden border border-white/5 shadow-2xl hover:scale-[1.02] transition-all">
                                        <img src={img} className="w-full aspect-[9/16] object-cover block"/>
                                        <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all duration-300">
                                            <a href={img} download={'NeoQuiz_Paso_'+(i+1)+'.png'} className="bg-white text-black p-4 rounded-full shadow-2xl active:scale-95">
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                            </a>
                                        </div>
                                        <div className="absolute top-4 left-4 bg-amber-500 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">PASO {i+1}</div>
                                    </div>
                                ))}
                              </div>
                            : <div className="border-2 border-dashed border-slate-800 rounded-[40px] aspect-[9/10] flex flex-col items-center justify-center text-slate-700 text-center p-12">
                                <svg className="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
                                <p className="text-xs font-bold uppercase tracking-widest leading-relaxed">
                                    Seleccioná un preset NRP<br/>y presioná <span className="text-amber-500">Generar Pack</span>
                                </p>
                              </div>}
                    </div>
                </div>
            </main>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

// ─── Canvas helpers ───────────────────────────────────────────────────────────
function rrect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
    if (!text) return 0;
    const words = text.split(' ');
    let line = '', lines = [];
    for (const w of words) {
        const test = line ? line+' '+w : w;
        if (ctx.measureText(test).width > maxW && line) { lines.push(line); line=w; }
        else line=test;
    }
    if (line) lines.push(line);
    lines.forEach((l,i) => ctx.fillText(l, x, y+i*lineH));
    return lines.length;
}

function drawQuizSlide(canvas, step, data) {
    const W=1080, H=1920;
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d');

    ctx.fillStyle='#020617'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#1e293b';
    for(let gx=30;gx<W;gx+=60) for(let gy=30;gy<H;gy+=60){
        ctx.beginPath(); ctx.arc(gx,gy,1.2,0,Math.PI*2); ctx.fill();
    }

    const P=90;
    const cY=P+40, cH=H-cY-180, cW=W-P*2;
    rrect(ctx,P,cY,cW,cH,72); ctx.fillStyle='#0f172a'; ctx.fill();
    rrect(ctx,P,cY,cW,cH,72); ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=2; ctx.stroke();
    const grd=ctx.createRadialGradient(W-P,cY+200,0,W-P,cY+200,500);
    grd.addColorStop(0,'rgba(245,158,11,0.08)'); grd.addColorStop(1,'transparent');
    rrect(ctx,P,cY,cW,cH,72); ctx.fillStyle=grd; ctx.fill();

    const iX=P+72, iW=cW-144;
    let y=cY+80;

    if(step===0){
        ctx.fillStyle='#f59e0b'; ctx.font='bold 32px system-ui'; ctx.fillText('NUEVO DESAFÍO',iX,y); y+=60;
        ctx.fillStyle='#fff'; ctx.font='bold 76px system-ui';
        const tl=wrapText(ctx,data.title.toUpperCase(),iX,y,iW,86); y+=tl*86+60;
        ctx.fillStyle='#64748b'; ctx.font='400 44px system-ui';
        wrapText(ctx,'¿Estás listo para responder como un experto?',iX,y,iW,56);
    }

    if(step===1){
        rrect(ctx,iX,y,280,58,29); ctx.fillStyle='rgba(59,130,246,0.15)'; ctx.fill();
        ctx.fillStyle='#3b82f6'; ctx.font='bold 28px system-ui'; ctx.textBaseline='middle'; ctx.fillText('EL ESCENARIO',iX+24,y+29); ctx.textBaseline='top'; y+=90;
        ctx.fillStyle='#fff'; ctx.font='bold 52px system-ui'; wrapText(ctx,data.caseText,iX,y,iW,66);
    }

    if(step===2){
        rrect(ctx,iX,y,280,58,29); ctx.fillStyle='rgba(245,158,11,0.15)'; ctx.fill();
        ctx.fillStyle='#f59e0b'; ctx.font='bold 28px system-ui'; ctx.textBaseline='middle'; ctx.fillText('LA PREGUNTA',iX+24,y+29); ctx.textBaseline='top'; y+=90;
        ctx.fillStyle='#fff'; ctx.font='bold 52px system-ui';
        const ql=wrapText(ctx,data.question,iX,y,iW,64); y+=ql*64+55;
        const oc=['#2563eb','#7c3aed','#0891b2'];
        for(let i=0;i<data.options.length;i++){
            const optText=data.options[i];
            // Medir líneas de la opción para determinar altura del bloque
            ctx.font='bold 32px system-ui';
            const words=optText.split(' '); let line=''; let optLines=1;
            for(const w of words){
                const t=line?line+' '+w:w;
                if(ctx.measureText(t).width>iW-140&&line){optLines++;line=w;}else line=t;
            }
            const oH=Math.max(110, 60+optLines*42);
            rrect(ctx,iX,y,iW,oH,36); ctx.fillStyle='#020617'; ctx.fill();
            rrect(ctx,iX,y,iW,oH,36); ctx.strokeStyle='#1e293b'; ctx.lineWidth=2; ctx.stroke();
            ctx.fillStyle=oc[i]||'#3b82f6'; ctx.font='bold 32px system-ui'; ctx.textBaseline='top';
            ctx.fillText('0'+(i+1)+'.',iX+24,y+20);
            ctx.fillStyle='#cbd5e1'; ctx.font='bold 32px system-ui';
            wrapText(ctx,optText,iX+110,y+20,iW-130,42);
            ctx.textBaseline='top'; y+=oH+18;
        }
    }

    if(step===3){
        rrect(ctx,iX,y,340,58,29); ctx.fillStyle='rgba(34,197,94,0.15)'; ctx.fill();
        ctx.fillStyle='#22c55e'; ctx.font='bold 28px system-ui'; ctx.textBaseline='middle'; ctx.fillText('RESPUESTA TÉCNICA',iX+24,y+29); ctx.textBaseline='top'; y+=90;
        ctx.fillStyle='#22c55e'; ctx.font='bold 64px system-ui';
        const al=wrapText(ctx,data.answer,iX,y,iW,76); y+=al*76+30;
        ctx.fillStyle='#22c55e'; ctx.fillRect(iX,y,120,6); y+=50;
        ctx.fillStyle='#94a3b8'; ctx.font='400 42px system-ui'; wrapText(ctx,data.explanation,iX,y,iW,58);
    }

    // Badge NRP
    ctx.fillStyle='rgba(37,99,235,0.15)'; ctx.font='bold 22px system-ui';
    const badge='NRP · AHA/AAP 8ª ED.';
    const bw=ctx.measureText(badge).width+40;
    rrect(ctx,W/2-bw/2,H-P-90,bw,44,22); ctx.fill();
    ctx.fillStyle='#3b82f6'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(badge,W/2,H-P-68);

    ctx.fillStyle='#1e293b'; ctx.font='bold 28px system-ui'; ctx.textBaseline='middle';
    ctx.fillText('NEOMONITOR.PRO',W/2,H-P-30);

    const dW=48,dH=12,dG=16,total=(dW+dG)*4-dG;
    let dx=W/2-total/2;
    for(let d=0;d<4;d++){
        rrect(ctx,dx,H-P+10,dW,dH,6); ctx.fillStyle=d===step?'#f59e0b':'#1e293b'; ctx.fill(); dx+=dW+dG;
    }
    ctx.textAlign='left'; ctx.textBaseline='top';
}

function drawQuizCTASlide(canvas, cta) {
    const W=1080, H=1920;
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#020617'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#1e293b';
    for(let gx=30;gx<W;gx+=60) for(let gy=30;gy<H;gy+=60){
        ctx.beginPath(); ctx.arc(gx,gy,1.2,0,Math.PI*2); ctx.fill();
    }
    const grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,900);
    grd.addColorStop(0,'rgba(245,158,11,0.14)'); grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
    const P=90, cx=W/2;
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillStyle='#f59e0b'; ctx.font='bold 34px system-ui';
    ctx.fillText(cta.tag,cx,P+40);
    ctx.fillStyle='#fff'; ctx.font='bold 110px system-ui';
    const hl=wrapText(ctx,cta.headline.toUpperCase(),cx,P+120,W-P*2,120);
    const subY=P+120+hl*120+52;
    ctx.fillStyle='#94a3b8'; ctx.font='400 50px system-ui';
    wrapText(ctx,cta.sub,cx,subY,W-P*2,68);
    const urlY=H-250;
    rrect(ctx,P,urlY,W-P*2,128,64); ctx.fillStyle='#f59e0b'; ctx.fill();
    ctx.fillStyle='#000'; ctx.font='bold 54px system-ui';
    ctx.textBaseline='middle'; ctx.fillText('WWW.NEOMONITOR.PRO',cx,urlY+64);
    ctx.fillStyle='#334155'; ctx.font='bold 28px system-ui';
    ctx.textBaseline='top'; ctx.fillText('NEOMONITOR',cx,H-106);
    ctx.textAlign='left'; ctx.textBaseline='top';
}

function SlidePreview({ step, data }) {
    const ref=useRef(null);
    useEffect(()=>{ if(ref.current) drawQuizSlide(ref.current,step,data); },[step,data]);
    return <canvas ref={ref} style={{width:'100%',height:'auto',borderRadius:16,display:'block'}}/>;
}

            setBatchDescriptions('');
        } catch (err) {
            alert('Error: ' + err.message);
        } finally {
            setIsBatchGenerating(false);
            setBatchProgress('');
        }
    };

    // ─── Descarga ZIP ─────────────────────────────────────────────────────────
    const downloadQuizAsZip = async () => {
        if (gallery.length === 0) { alert('Primero generá el pack de stories'); return; }
        try {
            const zip = new JSZip();
            const folderName = (data.title || 'quiz').replace(/[^a-z0-9]/gi, '_').toLowerCase().substring(0, 50);
            const quizFolder = zip.folder(folderName).folder('stories');
            const labels = ['1_portada', '2_escenario', '3_pregunta', '4_respuesta', '5_cta'];
            for (let i = 0; i < gallery.length; i++) {
                const base64 = gallery[i].replace(/^data:image\/png;base64,/, '');
                quizFolder.file(`${labels[i] || (i+1)}.png`, base64, { base64: true });
            }
            const blob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${folderName}_${new Date().toISOString().slice(0,10)}.zip`;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch(err) {
            alert('Error al crear ZIP: ' + err.message);
        }
    };

    const loadPreset=(key)=>{
        if(PRESETS[key]){ setData(PRESETS[key]); setActiveStep(0); setGallery([]); }
    };

    const updateField=(field,value,idx=null)=>{
        if(idx!==null){ const opts=[...data.options]; opts[idx]=value; setData(p=>({...p,options:opts})); }
        else setData(p=>({...p,[field]:value}));
    };

    const generate=async()=>{
        setGenerating(true); setGallery([]);
        const imgs=[];
        for(let i=0;i<4;i++){
            setStatus('Generando paso '+(i+1)+'/4…');
            await new Promise(r=>setTimeout(r,20));
            const c=document.createElement('canvas'); drawQuizSlide(c,i,data);
            imgs.push(c.toDataURL('image/png'));
        }
        setStatus('Generando llamada a la acción…');
        await new Promise(r=>setTimeout(r,20));
        const ctaC=document.createElement('canvas');
        drawQuizCTASlide(ctaC, CTA_POOL[Math.floor(Math.random()*CTA_POOL.length)]);
        imgs.push(ctaC.toDataURL('image/png'));
        setGallery(imgs);
        addToLibrary(data);
        setStatus(''); setGenerating(false);
    };

    const inp="w-full rounded-xl p-3 text-sm";

    return (
        <div className="min-h-screen bg-slate-950 text-slate-100 flex overflow-hidden">
            <aside className="w-72 bg-slate-900/50 border-r border-white/5 p-6 flex flex-col shrink-0">
                <div className="flex items-center gap-3 mb-12">
                    <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-blue-500/40">NM</div>
                    <span className="font-black text-xl tracking-tighter uppercase">NeoMonitor</span>
                </div>
                <nav>
                    <div className="p-4 rounded-2xl bg-amber-500/10 border border-amber-500/30 flex items-center gap-4 text-amber-400">
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                        <span className="font-bold text-sm">Interactive Quiz</span>
                    </div>
                </nav>
                <div className="mt-4 p-3 rounded-xl bg-blue-950/40 border border-blue-900/40">
                    <p className="text-[9px] text-blue-400 font-bold uppercase tracking-widest leading-relaxed">Basado en NRP<br/>AHA/AAP 8ª Ed. 2021<br/>+ Actualización 2023</p>
                </div>
                <div className="mt-auto pt-8 border-t border-white/5">
                    <p className="text-[10px] text-slate-600 font-bold uppercase tracking-widest">32 Presets Clínicos · v4.0</p>
                </div>
            </aside>

            <main className="flex-1 p-12 overflow-y-auto">
                <header className="mb-10 max-w-6xl mx-auto">
                    <h2 className="text-4xl font-black tracking-tight uppercase mb-2">NeoQuiz <span className="text-amber-500">Expert</span></h2>
                    <p className="text-slate-400 text-sm">32 presets · Neonatología, Pediatría y Adultos · Pack de 5 imágenes Stories 9:16 + CTA.</p>
                </header>

                <div className="grid lg:grid-cols-12 gap-8 max-w-6xl mx-auto items-start">
                    <div className="lg:col-span-5 space-y-6">
                        <div className="glass-card p-3 rounded-2xl">
                            <div className="flex gap-1 mb-3">
                                {['Portada','Escenario','Pregunta','Respuesta'].map((label,i)=>(
                                    <button key={i} onClick={()=>setActiveStep(i)}
                                        className={'flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition-all '+(activeStep===i?'bg-amber-500 text-white':'text-slate-500 hover:text-slate-300')}>
                                        {label}
                                    </button>
                                ))}
                            </div>
                            <div className="rounded-xl overflow-hidden border border-white/5">
                                <SlidePreview step={activeStep} data={data}/>
                            </div>
                        </div>

                        <div className="glass-card rounded-[32px] overflow-hidden">
                            {/* Tabs IA / Manual */}
                            <div className="flex border-b border-white/5">
                                <button onClick={() => setEditorMode('ai')}
                                    className={`flex-1 py-3.5 text-[10px] font-black uppercase tracking-widest transition-all ${editorMode === 'ai' ? 'bg-purple-600/20 text-purple-300 border-b-2 border-purple-500' : 'text-slate-500 hover:text-slate-300'}`}>
                                    ✨ Generar con IA
                                </button>
                                <button onClick={() => setEditorMode('manual')}
                                    className={`flex-1 py-3.5 text-[10px] font-black uppercase tracking-widest transition-all ${editorMode === 'manual' ? 'bg-amber-500/10 text-amber-300 border-b-2 border-amber-500' : 'text-slate-500 hover:text-slate-300'}`}>
                                    ✏️ Editor manual
                                </button>
                            </div>

                            <div className="p-6 space-y-4">
                                {/* ── Modo IA ── */}
                                {editorMode === 'ai' && (
                                    <div className="space-y-4">
                                        <p className="text-[11px] text-slate-500 leading-relaxed">
                                            Describí el escenario de reanimación. Claude genera el quiz completo con pregunta, opciones y explicación clínica.
                                        </p>
                                        <div>
                                            <label className="text-[10px] font-black text-purple-400 uppercase tracking-widest mb-1.5 block">Tema o escenario</label>
                                            <textarea className={inp+" resize-none"} rows={4}
                                                value={aiDescription}
                                                onChange={e => setAiDescription(e.target.value)}
                                                placeholder="Ej: PCR neonatal con bradicardia severa que no responde a VPP&#10;Anafilaxia pediátrica en guardia&#10;TEP masivo con inestabilidad hemodinámica"/>
                                        </div>
                                        <button onClick={generateWithAI} disabled={isGeneratingAI || !aiDescription.trim()}
                                            className="w-full bg-purple-600 hover:bg-purple-500 disabled:opacity-40 text-white font-black py-5 rounded-2xl transition-all uppercase tracking-widest text-xs flex items-center justify-center gap-3">
                                            {isGeneratingAI
                                                ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"/>Generando con IA…</>
                                                : <>✨ Generar Quiz con IA</>}
                                        </button>
                                    </div>
                                )}

                                {/* ── Modo Manual ── */}
                                {editorMode === 'manual' && (<>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Preset NRP</label>
                                        <select onChange={e=>loadPreset(e.target.value)} className={inp+" font-bold cursor-pointer"}>
                                            <option value="">— Nuevo desafío —</option>
                                            <optgroup label="─ Neonatología — Originales ─">
                                                <option value="arritmia">Arritmia Neonatal (TSV)</option>
                                                <option value="cpap">Fallo Respiratorio / CPAP</option>
                                            </optgroup>
                                            <optgroup label="─ Neonatología — NRP 8ª Ed. ─">
                                                <option value="vpp_inicio">¿Cuándo Iniciar VPP?</option>
                                                <option value="fio2_termino">FiO₂ Inicial — RN de Término</option>
                                                <option value="fio2_prematuro">FiO₂ Inicial — Prematuro</option>
                                                <option value="sopa_steps">Pasos MR-SOPA</option>
                                                <option value="compresiones_indicacion">Indicación de Compresiones</option>
                                                <option value="epinefrina_via">Epinefrina: Vía y Dosis</option>
                                                <option value="temperatura_prematuro">Termorregulación Prematuro</option>
                                                <option value="meconio_nrp8">Meconio Espeso — NRP 8ª Ed.</option>
                                                <option value="clampe_cordon">Pinzamiento del Cordón</option>
                                                <option value="hipotermia_ehi">Hipotermia Terapéutica — EHI</option>
                                            </optgroup>
                                            <optgroup label="─ Pediatría ─">
                                                <option value="pedi_epinefrina_anafilaxia">Epinefrina en Anafilaxia Pediátrica</option>
                                                <option value="pedi_croup_epiglotitis">Croup vs Epiglotitis</option>
                                                <option value="pedi_convulsion_primera">Primera Línea en Convulsión</option>
                                                <option value="pedi_shock_reconocimiento">Reconocimiento de Shock Pediátrico</option>
                                                <option value="pedi_asma_gravedad">Gravedad de Crisis Asmática</option>
                                                <option value="pedi_cad_complicacion">Complicación más grave de CAD</option>
                                                <option value="pedi_sepsis_bolo">Volumen en Sepsis Pediátrica</option>
                                                <option value="pedi_bronquiolitis_tto">Manejo de Bronquiolitis Grave</option>
                                                <option value="pedi_tce_indicacion_tc">Indicación TC en TCE Pediátrico</option>
                                                <option value="pedi_rcp_ratio">RCP en Lactantes — Ratio y Técnica</option>
                                            </optgroup>
                                            <optgroup label="─ Adultos ─">
                                                <option value="adult_sdra_berlin">SDRA — Criterios de Berlín</option>
                                                <option value="adult_killip">Clasificación Killip-Kimball</option>
                                                <option value="adult_sepsis_bundle">Bundle Sepsis — Hora 1</option>
                                                <option value="adult_tep_trombolisis">Trombólisis en TEP Masivo</option>
                                                <option value="adult_stroke_ventana">Ventana Trombolítica en ACV</option>
                                                <option value="adult_pcr_adrenalina">Adrenalina en PCR — Timing</option>
                                                <option value="adult_isr_secuencia">ISR — Secuencia de Fármacos</option>
                                                <option value="adult_epoc_spo2">Objetivo SpO₂ en EPOC Agudizado</option>
                                                <option value="adult_hta_reduccion">Crisis HTA — Cuánto y Cuán Rápido</option>
                                                <option value="adult_estado_epi_segunda">Estado Epiléptico — Segunda Línea</option>
                                            </optgroup>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Título</label>
                                        <input className={inp+" font-bold"} value={data.title} onChange={e=>updateField('title',e.target.value)} placeholder="Título del quiz"/>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Escenario clínico</label>
                                        <textarea className={inp+" resize-none"} rows={3} value={data.caseText} onChange={e=>updateField('caseText',e.target.value)} placeholder="Caso clínico..."/>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-amber-600 uppercase tracking-widest mb-1 block">Pregunta</label>
                                        <input className={inp+" font-bold"} style={{color:'#f59e0b'}} value={data.question} onChange={e=>updateField('question',e.target.value)} placeholder="¿Qué conducta tomarías?"/>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block">Opciones de respuesta</label>
                                        {data.options.map((opt,i)=>(
                                            <input key={i} className={inp} value={opt} onChange={e=>updateField('options',e.target.value,i)} placeholder={'Opción '+(i+1)}/>
                                        ))}
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-green-600 uppercase tracking-widest mb-1 block">Respuesta correcta</label>
                                        <input className={inp+" font-bold"} style={{color:'#22c55e'}} value={data.answer} onChange={e=>updateField('answer',e.target.value)} placeholder="Respuesta"/>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Explicación técnica</label>
                                        <textarea className={inp+" resize-none"} rows={3} value={data.explanation} onChange={e=>updateField('explanation',e.target.value)} placeholder="Explicación técnica basada en NRP..."/>
                                    </div>
                                </>)}

                                <button onClick={generate} disabled={generating || editorMode === 'ai'}
                                    className="w-full bg-amber-600 hover:bg-amber-500 disabled:opacity-50 text-white font-black py-5 rounded-2xl shadow-xl transition-all uppercase tracking-widest text-xs flex items-center justify-center gap-3">
                                    {generating
                                        ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"/>{status}</>
                                        : <><svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>Generar Pack de Stories</>}
                                </button>
                                {gallery.length > 0 && (
                                    <button onClick={downloadQuizAsZip}
                                        className="w-full bg-slate-800 hover:bg-slate-700 text-white font-black py-4 rounded-2xl transition-all uppercase tracking-widest text-xs flex items-center justify-center gap-2 border border-white/5">
                                        📦 Descargar ZIP
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* ── Generar en Masa ── */}
                        <div className="glass-card p-6 rounded-[32px] space-y-4">
                            <div>
                                <h3 className="text-xs font-black uppercase tracking-widest text-slate-300 mb-1">📦 Generar en Masa</h3>
                                <p className="text-[11px] text-slate-600 leading-relaxed">Un tema por línea. Claude genera cada quiz y los comprime en un ZIP listo para descargar.</p>
                            </div>
                            <textarea className={inp+" resize-none"} rows={5}
                                value={batchDescriptions}
                                onChange={e => setBatchDescriptions(e.target.value)}
                                placeholder={"PCR neonatal post-VPP sin respuesta\nAnafilaxia pediátrica con colapso\nFibrilación ventricular en adulto\nEHI moderada en RN de término\nShock séptico en lactante"}
                                disabled={isBatchGenerating}/>
                            {batchProgress && (
                                <p className="text-[11px] text-purple-400 font-bold uppercase tracking-widest truncate">{batchProgress}</p>
                            )}
                            <button onClick={batchGenerateQuizzes} disabled={isBatchGenerating || !batchDescriptions.trim()}
                                className="w-full bg-slate-700 hover:bg-slate-600 disabled:opacity-40 text-white font-black py-4 rounded-2xl transition-all uppercase tracking-widest text-xs flex items-center justify-center gap-2 border border-white/10">
                                {isBatchGenerating
                                    ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"/>Generando…</>
                                    : <>📦 Generar + ZIP</>}
                            </button>
                        </div>
                    </div>

                    <div className="lg:col-span-7">
                        {/* Tabs */}
                        <div className="flex gap-2 mb-6">
                            <button onClick={() => setActiveTab('editor')}
                                className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'editor' ? 'bg-amber-500 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>
                                ✏️ Editor
                            </button>
                            <button onClick={() => setActiveTab('library')}
                                className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'library' ? 'bg-amber-500 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>
                                📚 Biblioteca ({library.length})
                            </button>
                        </div>

                        {/* Panel Editor */}
                        {activeTab === 'editor' && (
                            gallery.length>0
                            ? <div className="grid grid-cols-2 gap-4 fade-in">
                                {gallery.map((img,i)=>(
                                    <div key={i} className="group relative rounded-3xl overflow-hidden border border-white/5 shadow-2xl hover:scale-[1.02] transition-all">
                                        <img src={img} className="w-full aspect-[9/16] object-cover block"/>
                                        <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all duration-300">
                                            <a href={img} download={'NeoQuiz_Paso_'+(i+1)+'.png'} className="bg-white text-black p-4 rounded-full shadow-2xl active:scale-95">
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                            </a>
                                        </div>
                                        <div className="absolute top-4 left-4 bg-amber-500 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">PASO {i+1}</div>
                                    </div>
                                ))}
                              </div>
                            : <div className="border-2 border-dashed border-slate-800 rounded-[40px] aspect-[9/10] flex flex-col items-center justify-center text-slate-700 text-center p-12">
                                <svg className="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
                                <p className="text-xs font-bold uppercase tracking-widest leading-relaxed">
                                    Seleccioná un preset NRP<br/>y presioná <span className="text-amber-500">Generar Pack</span>
                                </p>
                              </div>
                        )}

                        {/* Panel Biblioteca */}
                        {activeTab === 'library' && (
                            library.length === 0
                            ? <div className="border-2 border-dashed border-slate-800 rounded-[40px] flex flex-col items-center justify-center text-slate-700 text-center p-16" style={{minHeight:'300px'}}>
                                <p className="text-xs font-bold uppercase tracking-widest leading-relaxed">Biblioteca vacía<br/><span className="text-amber-500/50">Los quizzes generados aparecerán acá</span></p>
                              </div>
                            : <div className="space-y-4 fade-in">
                                {library.map(item => (
                                    <div key={item.id} className="glass-card p-5 rounded-2xl">
                                        <div className="flex items-start justify-between gap-3">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2 mb-1 flex-wrap">
                                                    <span className="text-[9px] font-black px-2 py-1 rounded-full bg-amber-500/15 text-amber-400 uppercase">Quiz Pack</span>
                                                    <select value={item.status} onChange={e => updateLibraryStatus(item.id, e.target.value)}
                                                        className="text-[9px] font-black px-2 py-1 rounded-full border-0 cursor-pointer"
                                                        style={{background:'rgba(255,255,255,0.05)', color: item.status==='Publicado'?'#818cf8':item.status==='Listo'?'#4ade80':'#94a3b8'}}>
                                                        <option value="Borrador">Borrador</option>
                                                        <option value="Listo">Listo</option>
                                                        <option value="Publicado">Publicado</option>
                                                    </select>
                                                </div>
                                                <p className="font-bold text-sm text-white mb-0.5">{item.title}</p>
                                                <p className="text-[11px] text-slate-600">{item.dateTime}</p>
                                            </div>
                                            <div className="flex gap-2 shrink-0">
                                                <button onClick={() => regenerateFromLibrary(item)}
                                                    className="text-[10px] font-bold text-amber-400 hover:text-amber-300 px-3 py-1.5 rounded-lg bg-amber-500/10 border border-amber-500/20 transition-colors">
                                                    ↻ Recargar
                                                </button>
                                                <button onClick={() => deleteLibraryItem(item.id)}
                                                    className="text-[10px] font-bold text-slate-600 hover:text-red-400 px-3 py-1.5 rounded-lg bg-white/5 border border-white/5 transition-colors">
                                                    ✕
                                                </button>
                                            </div>
                                        </div>
                                        {item.caption && (
                                            <div className="mt-3 pt-3 border-t border-white/5">
                                                <div className="flex items-center justify-between mb-1">
                                                    <p className="text-[9px] text-slate-600 uppercase font-black tracking-widest">Caption</p>
                                                    <button onClick={() => navigator.clipboard.writeText(item.caption).then(() => alert('✓ Caption copiado'))}
                                                        className="text-[9px] font-black text-amber-400 hover:text-amber-300 px-2 py-0.5 rounded bg-amber-500/10 border border-amber-500/20 transition-colors">
                                                        📋 Copiar
                                                    </button>
                                                </div>
                                                <p className="text-[9px] text-slate-500 leading-relaxed line-clamp-3 whitespace-pre-line">{item.caption}</p>
                                            </div>
                                        )}
                                    </div>
                                ))}
                              </div>
                        )}
                    </div>
                </div>
            </main>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

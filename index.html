<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoMonitor | Marketing Suite Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .nav-btn.active {
            background: #1d4ed8;
            color: white;
            box-shadow: 0 0 20px rgba(29, 78, 216, 0.3);
        }
        input, textarea, select {
            background: #0f172a !important;
            border: 1px solid #1e293b !important;
            color: white !important;
        }
        
        /* Mockup Studio Perspective Styles - RECALIBRATED V3 */
        .mockup-stage { width: 800px; height: 600px; position: relative; background-color: #000; overflow: hidden; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .bg-image { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }
        .screen-overlay { position: absolute; z-index: 10; overflow: hidden; background: #000; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .screen-overlay img { width: 100%; height: 100%; object-fit: cover; }
        
        /* UCIN Escena 1 */
        .scene-1 .screen-overlay { width: 330px; height: 215px; top: 185px; left: 242px; transform: perspective(1000px) rotateX(10deg) rotateY(-5deg) rotateZ(0deg); border-radius: 6px; }
        /* Mano Escena 2 */
        .scene-2 .screen-overlay { width: 122px; height: 260px; top: 132px; left: 342px; transform: perspective(1000px) rotateX(2deg) rotateY(18deg) rotateZ(-12deg); border-radius: 14px; }
        /* Escritorio Escena 3 */
        .scene-3 .screen-overlay { width: 315px; height: 198px; top: 125px; left: 242px; transform: perspective(1000px) rotateX(1deg) rotateY(0deg); border-radius: 4px; }

        .bg-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; object-fit: cover; opacity: 0.6; }
        .bg-thumb.active { border-color: #a855f7; box-shadow: 0 0 10px rgba(168, 85, 247, 0.4); opacity: 1; }

        /* Carousel Render Canvas */
        .carousel-canvas { width: 1080px; height: 1080px; background: #020617; position: relative; overflow: hidden; display: none; }
        .medical-grid { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 40px 40px; }

        .thumb-preview { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        
        #demo-canvas-preview {
            max-width: 100%;
            height: auto;
            background: #000;
            border: 4px solid #1e293b;
            border-radius: 24px;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navegación Lateral -->
    <nav class="fixed left-0 top-0 h-full w-20 md:w-64 glass-card border-r border-slate-800 z-50 flex flex-col items-center py-8">
        <div class="mb-12 flex items-center gap-3 px-4 text-center">
            <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center text-black font-black shadow-lg shadow-green-500/40 shrink-0">NM</div>
            <span class="hidden md:block font-black text-lg tracking-tighter uppercase leading-none">Marketing Suite<br><span class="text-[9px] text-blue-500 tracking-[0.3em]">Expert v3.1</span></span>
        </div>

        <div class="flex-1 w-full space-y-2 px-2">
            <button onclick="showTool('promo')" id="btn-promo" class="nav-btn active w-full p-4 rounded-2xl flex items-center gap-4 transition-all hover:bg-slate-800/50">
                <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"/></svg>
                <span class="hidden md:block font-semibold text-sm text-left leading-none">Promociones <br><span class="text-[10px] text-green-500 opacity-60 uppercase tracking-widest text-xs font-black">Expert 9:16</span></span>
            </button>
            <button onclick="showTool('demo')" id="btn-demo" class="nav-btn w-full p-4 rounded-2xl flex items-center gap-4 transition-all hover:bg-slate-800/50">
                <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-width="2"/></svg>
                <span class="hidden md:block font-semibold text-sm text-left leading-none">Demos Rápidas <br><span class="text-[10px] text-amber-500 opacity-60 uppercase tracking-widest text-xs font-black">Video Sync</span></span>
            </button>
            <button onclick="showTool('carousel')" id="btn-carousel" class="nav-btn w-full p-4 rounded-2xl flex items-center gap-4 transition-all hover:bg-slate-800/50">
                <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2"/></svg>
                <span class="hidden md:block font-semibold text-sm text-left leading-none">Casos Clínicos <br><span class="text-[10px] text-blue-500 opacity-60 uppercase tracking-widest text-xs font-black">Editable 1:1</span></span>
            </button>
            <button onclick="showTool('mockup')" id="btn-mockup" class="nav-btn w-full p-4 rounded-2xl flex items-center gap-4 transition-all hover:bg-slate-800/50">
                <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-width="2"/></svg>
                <span class="hidden md:block font-semibold text-sm text-left leading-none">Mockup Studio <br><span class="text-[10px] text-purple-500 opacity-60 uppercase tracking-widest text-xs font-black">Escenas Pro</span></span>
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="ml-20 md:ml-64 p-4 md:p-12">

        <!-- 1. PROMO GENERATOR -->
        <section id="tool-promo" class="tool-section max-w-6xl mx-auto">
            <header class="mb-10">
                <h2 class="text-4xl font-black tracking-tight mb-2 uppercase">Promociones <span class="text-green-500">Expert</span></h2>
                <p class="text-slate-400">Genera archivos HTML independientes con soporte multimedia.</p>
            </header>
            <div class="grid lg:grid-cols-12 gap-8 items-start">
                <div class="lg:col-span-8 space-y-6" id="promo-slides-container"></div>
                <div class="lg:col-span-4 sticky top-12 space-y-6">
                    <div class="glass-card p-6 rounded-3xl border border-slate-700">
                        <div class="space-y-4 mb-6">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block">Acción final</label>
                            <input type="text" id="promo-cta-text" value="¡Probálo ahora!" class="w-full p-3 rounded-xl text-sm">
                            <input type="text" id="promo-cta-url" value="neomonitor.pro" class="w-full p-3 rounded-xl text-sm">
                        </div>
                        <button onclick="downloadPromoHTML()" id="btn-download-promo" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-2">
                            DESCARGAR PROMO HTML
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 2. DEMO EDITOR (VIDEO SYNC) -->
        <section id="tool-demo" class="tool-section max-w-5xl mx-auto hidden">
            <header class="mb-10">
                <h2 class="text-4xl font-black tracking-tight mb-2 uppercase">Demos <span class="text-amber-500">Sync</span></h2>
                <p class="text-slate-400">Une el monitor y el mando en un clip vertical para Reels.</p>
            </header>
            <div class="grid lg:grid-cols-12 gap-8 items-start">
                <div class="lg:col-span-5 space-y-4">
                    <div class="glass-card p-6 rounded-3xl space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block">Video Monitor (Top)</label>
                            <input type="file" id="video-monitor" accept="video/*" onchange="loadSyncVideo('monitor')" class="w-full text-xs">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black

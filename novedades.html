<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoMonitor | Novedades Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; overflow: hidden; height: 100vh; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        input, textarea, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; transition: border-color .2s; font-family: 'Inter', sans-serif; }
        input:focus, textarea:focus, select:focus { border-color: #f59e0b !important; box-shadow: 0 0 0 2px rgba(245,158,11,0.1) !important; }
        .glass { background: rgba(15,23,42,0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); }
        .fade-in { animation: fadeIn 0.35s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .slide-item { transition: all .2s; cursor: pointer; border-left: 3px solid transparent; }
        .slide-item:hover { background: rgba(255,255,255,0.04); }
        .slide-item.active { background: rgba(245,158,11,0.12); border-left-color: #f59e0b; }
        .btn { transition: all .2s; cursor: pointer; font-weight: 700; letter-spacing: .05em; font-size: .7rem; text-transform: uppercase; }
        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .recording-dot { animation: recPulse 1s infinite; }
        @keyframes recPulse { 0%,100% { opacity:1; } 50% { opacity:.2; } }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ─── PALETAS DE COLOR ───────────────────────────────────────────────────── */
const PALETTES = {
    azul:    { name: "NeoBlue",    bg: "#020617", accent: "#2563eb", text: "#f8fafc", sub: "#94a3b8", tag: "#1d4ed8" },
    azulClaro: { name: "NeoBlue Light", bg: "#f0f7ff", accent: "#1d4ed8", text: "#0f172a", sub: "#475569", tag: "#1e40af" },
    ambar:   { name: "NeoAmber",   bg: "#0c0a00", accent: "#f59e0b", text: "#fffbeb", sub: "#a3a375", tag: "#b45309" },
    ambarClaro: { name: "NeoAmber Light", bg: "#fffbf0", accent: "#b45309", text: "#0f0202", sub: "#92400e", tag: "#92400e" },
    verde:   { name: "NeoGreen",   bg: "#011003", accent: "#22c55e", text: "#f0fdf4", sub: "#86efac", tag: "#15803d" },
    verdeClaro: { name: "NeoGreen Light", bg: "#f0fdf4", accent: "#15803d", text: "#020f02", sub: "#16a34a", tag: "#166534" },
    violeta: { name: "NeoPurple",  bg: "#07000f", accent: "#a855f7", text: "#faf5ff", sub: "#c4b5fd", tag: "#7e22ce" },
    violetaClaro: { name: "NeoPurple Light", bg: "#faf5ff", accent: "#7e22ce", text: "#0f0018", sub: "#9370db", tag: "#6b21a8" },
    rojo:    { name: "NeoRed",     bg: "#0f0203", accent: "#ef4444", text: "#fff5f5", sub: "#fca5a5", tag: "#b91c1c" },
    rojoClaro: { name: "NeoRed Light", bg: "#fff5f5", accent: "#b91c1c", text: "#0f0203", sub: "#f87171", tag: "#991b1b" },
    oscuro:  { name: "NeoDark",    bg: "#0f172a", accent: "#e2e8f0", text: "#f8fafc", sub: "#64748b", tag: "#334155" },
    claro:   { name: "NeoClear",   bg: "#ffffff", accent: "#6366f1", text: "#0f172a", sub: "#64748b", tag: "#4f46e5" },
    rosado:  { name: "NeoPink",    bg: "#ff077d", accent: "#ec4899", text: "#fff5f8", sub: "#f472b6", tag: "#be185d" },
    rosadoClaro: { name: "NeoPink Light", bg: "#fff5f8", accent: "#be185d", text: "#0f0207", sub: "#f472b6", tag: "#831843" },
    cian:    { name: "NeoCyan",    bg: "#001f2f", accent: "#06b6d4", text: "#f0f9fa", sub: "#67e8f9", tag: "#0891b2" },
    cianClaro: { name: "NeoCyan Light", bg: "#f0f9fa", accent: "#0891b2", text: "#001f2f", sub: "#06b6d4", tag: "#164e63" },
};

const FORMATS = {
    carousel: { label: "Carrusel 1:1",   w: 1080, h: 1080, icon: "⬜" },
    reel:     { label: "Reel/Historia 9:16", w: 1080, h: 1920, icon: "📱" },
};

const DEFAULT_SLIDES = [
    { id: 1, title: "Nueva Funcionalidad", subtitle: "NeoMonitor v2.0", body: "Descripción de la nueva característica del software. Explicá brevemente el beneficio para el usuario.", tag: "NUEVO", palette: "azul", audioUrl: null },
    { id: 2, title: "Mejora de Rendimiento", subtitle: "Procesamiento en tiempo real", body: "El motor de cálculo fue optimizado para reducir la latencia en escenarios de alta demanda clínica.", tag: "MEJORA", palette: "verde", audioUrl: null },
    { id: 3, title: "Disponible Ahora", subtitle: "Actualización gratuita", body: "Descargá la última versión de NeoMonitor desde el panel de administración de tu institución.", tag: "UPDATE", palette: "ambar", audioUrl: null },
];

/* ─── CANVAS HELPERS ─────────────────────────────────────────────────────── */
function wrapText(ctx, text, x, y, maxW, lineH, maxLines) {
    if (!text) return 0;
    const words = text.split(' ');
    let line = '', lines = [];
    for (const w of words) {
        const test = line ? line + ' ' + w : w;
        if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
        else line = test;
    }
    if (line) lines.push(line);
    if (maxLines) lines = lines.slice(0, maxLines);
    lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineH));
    return lines.length;
}

function dotGrid(ctx, w, h, gap, r, color) {
    gap = gap || 50; r = r || 1.5;
    ctx.fillStyle = color || 'rgba(255,255,255,0.06)';
    for (let gx = gap / 2; gx < w; gx += gap)
        for (let gy = gap / 2; gy < h; gy += gap) {
            ctx.beginPath(); ctx.arc(gx, gy, r, 0, Math.PI * 2); ctx.fill();
        }
}

function drawSlideCarousel(ctx, slide, W, H) {
    const pal = PALETTES[slide.palette] || PALETTES.azul;

    // Fondo
    ctx.fillStyle = pal.bg;
    ctx.fillRect(0, 0, W, H);
    dotGrid(ctx, W, H, 60, 1.8);

    // Franja decorativa lateral
    const stripW = 12;
    ctx.fillStyle = pal.accent;
    ctx.fillRect(0, 0, stripW, H);

    // Gradiente sutil
    const grad = ctx.createLinearGradient(stripW, 0, W, H);
    grad.addColorStop(0, pal.accent + '18');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(stripW, 0, W - stripW, H);

    const PAD = 90;

    // TAG
    if (slide.tag) {
        ctx.font = `900 28px Inter, sans-serif`;
        const tagW = ctx.measureText(slide.tag).width + 40;
        ctx.fillStyle = pal.accent;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(PAD, PAD, tagW, 48, 8);
        else ctx.rect(PAD, PAD, tagW, 48);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.textBaseline = 'middle';
        ctx.fillText(slide.tag, PAD + 20, PAD + 24);
        ctx.textBaseline = 'top';
    }

    // TÍTULO
    const titleY = slide.tag ? PAD + 90 : PAD;
    ctx.fillStyle = pal.text;
    ctx.font = `900 ${W === 1080 ? 86 : 72}px Inter, sans-serif`;
    ctx.textBaseline = 'top';
    const titleLines = wrapText(ctx, slide.title, PAD, titleY, W - PAD * 2 - stripW, 100, 3);

    // SUBTÍTULO
    const subY = titleY + titleLines * 100 + 28;
    ctx.fillStyle = pal.accent;
    ctx.font = `700 32px Inter, sans-serif`;
    ctx.fillText(slide.subtitle || '', PAD, subY);

    // Línea separadora
    const lineY = subY + 56;
    ctx.strokeStyle = pal.accent + '50';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(PAD, lineY);
    ctx.lineTo(W - PAD, lineY);
    ctx.stroke();

    // CUERPO
    const bodyY = lineY + 40;
    ctx.fillStyle = pal.sub;
    ctx.font = `400 38px Inter, sans-serif`;
    wrapText(ctx, slide.body, PAD, bodyY, W - PAD * 2 - stripW, 54, 8);

    // LOGO / MARCA
    const logoY = H - PAD - 36;
    ctx.fillStyle = pal.accent;
    ctx.font = `900 36px Inter, sans-serif`;
    ctx.textBaseline = 'bottom';
    ctx.fillText('NeoMonitor', PAD, logoY + 36);
    ctx.fillStyle = pal.sub + '80';
    ctx.font = `400 24px Inter, sans-serif`;
    ctx.fillText('Expert Suite', PAD + ctx.measureText('NeoMonitor').width + 16, logoY + 36);
    ctx.textBaseline = 'top';

    // AUDIO INDICATOR
    if (slide.audioUrl) {
        const audioIconSize = 32;
        const audioX = W - PAD - audioIconSize;
        const audioY = logoY - audioIconSize;
        ctx.fillStyle = pal.accent + '20';
        ctx.fillRect(audioX, audioY, audioIconSize, audioIconSize);
        ctx.fillStyle = pal.accent;
        ctx.font = `900 24px Inter, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🔊', audioX + audioIconSize / 2, audioY + audioIconSize / 2);
        ctx.textAlign = 'left';
    }
}

function drawSlideReel(ctx, slide, W, H) {
    const pal = PALETTES[slide.palette] || PALETTES.azul;

    // Fondo
    ctx.fillStyle = pal.bg;
    ctx.fillRect(0, 0, W, H);
    dotGrid(ctx, W, H, 70, 2);

    // Gradiente vertical dramático
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, pal.accent + '28');
    grad.addColorStop(0.5, 'transparent');
    grad.addColorStop(1, pal.accent + '18');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Franja superior
    ctx.fillStyle = pal.accent;
    ctx.fillRect(0, 0, W, 14);

    // Franja inferior
    ctx.fillRect(0, H - 14, W, 14);

    const PAD = 80;
    const centerY = H / 2;

    // TAG centrado arriba del centro
    if (slide.tag) {
        ctx.font = `900 32px Inter, sans-serif`;
        const tagW = ctx.measureText(slide.tag).width + 48;
        const tagX = (W - tagW) / 2;
        const tagY = centerY - 340;
        ctx.fillStyle = pal.accent;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(tagX, tagY, tagW, 56, 10);
        else ctx.rect(tagX, tagY, tagW, 56);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(slide.tag, W / 2, tagY + 28);
        ctx.textBaseline = 'top';
        ctx.textAlign = 'left';
    }

    // TÍTULO centrado
    ctx.fillStyle = pal.text;
    ctx.font = `900 92px Inter, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const titleStartY = centerY - 260;
    const tWords = (slide.title || '').split(' ');
    let tLine = '', tLines = [];
    for (const w of tWords) {
        const test = tLine ? tLine + ' ' + w : w;
        if (ctx.measureText(test).width > W - PAD * 2 && tLine) { tLines.push(tLine); tLine = w; }
        else tLine = test;
    }
    if (tLine) tLines.push(tLine);
    tLines.slice(0, 3).forEach((l, i) => ctx.fillText(l, W / 2, titleStartY + i * 108));
    const titleEndY = titleStartY + Math.min(tLines.length, 3) * 108;

    // SUBTÍTULO
    ctx.fillStyle = pal.accent;
    ctx.font = `700 36px Inter, sans-serif`;
    ctx.fillText(slide.subtitle || '', W / 2, titleEndY + 24);

    // Línea
    ctx.strokeStyle = pal.accent + '60';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(PAD * 2, titleEndY + 90);
    ctx.lineTo(W - PAD * 2, titleEndY + 90);
    ctx.stroke();

    // CUERPO
    ctx.fillStyle = pal.sub;
    ctx.font = `400 42px Inter, sans-serif`;
    ctx.textBaseline = 'top';
    const bodyWords = (slide.body || '').split(' ');
    let bLine = '', bLines = [];
    for (const w of bodyWords) {
        const test = bLine ? bLine + ' ' + w : w;
        if (ctx.measureText(test).width > W - PAD * 2 && bLine) { bLines.push(bLine); bLine = w; }
        else bLine = test;
    }
    if (bLine) bLines.push(bLine);
    bLines.slice(0, 6).forEach((l, i) => ctx.fillText(l, W / 2, titleEndY + 110 + i * 58));

    // LOGO
    ctx.fillStyle = pal.text;
    ctx.font = `900 42px Inter, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('NeoMonitor', W / 2, H - 80);
    ctx.fillStyle = pal.sub + '80';
    ctx.font = `400 28px Inter, sans-serif`;
    ctx.fillText('Expert Suite', W / 2, H - 40);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    // AUDIO INDICATOR
    if (slide.audioUrl) {
        const audioIconSize = 40;
        const audioX = W - 60;
        const audioY = 40;
        ctx.fillStyle = pal.accent + '30';
        ctx.fillRect(audioX, audioY, audioIconSize, audioIconSize);
        ctx.fillStyle = pal.accent;
        ctx.font = `900 32px Inter, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🔊', audioX + audioIconSize / 2, audioY + audioIconSize / 2);
        ctx.textAlign = 'left';
    }
}

/* ─── COMPONENTE PRINCIPAL ───────────────────────────────────────────────── */
function App() {
    const [slides, setSlides] = useState(DEFAULT_SLIDES);
    const [activeIdx, setActiveIdx] = useState(0);
    const [format, setFormat] = useState('carousel');
    const [slideDuration, setSlideDuration] = useState(3000);
    const [recording, setRecording] = useState(false);
    const [recProgress, setRecProgress] = useState(0);
    const [tab, setTab] = useState('editor'); // 'editor' | 'preview'
    const [mainTab, setMainTab] = useState('editor'); // 'editor' | 'library'
    const [library, setLibrary] = useState([]);
    const [defaultAudioFileName, setDefaultAudioFileName] = useState('');
    const [defaultAudioUrl, setDefaultAudioUrl] = useState(null);
    const canvasRef = useRef(null);
    const mediaRecRef = useRef(null);
    const chunksRef = useRef([]);
    const audioRef = useRef(null);
    const [isPlayingAudio, setIsPlayingAudio] = useState(false);

    const fmt = FORMATS[format];
    const slide = slides[activeIdx] || slides[0];

    // ─── Biblioteca ───────────────────────────────────────────────────────────
    useEffect(() => {
        try {
            const saved = localStorage.getItem('neonovedades_library');
            if (saved) setLibrary(JSON.parse(saved));
        } catch(e) {}
    }, []);

    useEffect(() => {
        try { localStorage.setItem('neonovedades_library', JSON.stringify(library)); } catch(e) {}
    }, [library]);

    useEffect(() => {
        try {
            const savedBase64 = localStorage.getItem('neonovedades_defaultAudio');
            const savedName = localStorage.getItem('neonovedades_defaultAudioName');
            if (savedBase64 && savedName) {
                setDefaultAudioUrl(savedBase64);
                setDefaultAudioFileName('⭐ ' + savedName);
            }
        } catch(e) {}
    }, []);

    const addToLibrary = (type) => {
        const title = slides[0]?.title || 'Sin título';
        const newItem = {
            id: Date.now(),
            title,
            type,
            slideCount: slides.length,
            dateTime: new Date().toLocaleString('es-AR'),
            status: 'Borrador',
            slidesData: slides.map(s => ({ ...s, audioUrl: null })) // sin audio para no saturar localStorage
        };
        setLibrary(prev => [newItem, ...prev]);
    };

    const updateLibraryStatus = (id, status) => {
        setLibrary(prev => prev.map(item => item.id === id ? { ...item, status } : item));
    };

    const deleteLibraryItem = (id) => {
        if (confirm('¿Eliminar de la biblioteca?')) {
            setLibrary(prev => prev.filter(item => item.id !== id));
        }
    };

    const regenerateFromLibrary = (item) => {
        setSlides(item.slidesData);
        setActiveIdx(0);
        setMainTab('editor');
        alert('✓ Novedades cargadas en el editor');
    };

    // ─── Audio por defecto global ─────────────────────────────────────────────
    const handleDefaultAudio = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            if (file.size > 10 * 1024 * 1024 && !confirm(`El archivo pesa ${(file.size/1024/1024).toFixed(1)}MB. ¿Guardarlo como defecto?`)) return;
            localStorage.setItem('neonovedades_defaultAudio', ev.target.result);
            localStorage.setItem('neonovedades_defaultAudioName', file.name);
            setDefaultAudioUrl(ev.target.result);
            setDefaultAudioFileName('⭐ ' + file.name);
            alert(`✓ "${file.name}" es ahora el audio por defecto`);
        };
        reader.readAsDataURL(file);
    };

    const removeDefaultAudio = () => {
        localStorage.removeItem('neonovedades_defaultAudio');
        localStorage.removeItem('neonovedades_defaultAudioName');
        setDefaultAudioUrl(null);
        setDefaultAudioFileName('');
    };

    // ─── Generación con IA ────────────────────────────────────────────────────
    const [novDescription, setNovDescription] = useState('');
    const [isGeneratingAI, setIsGeneratingAI] = useState(false);
    const [editorTab, setEditorTab] = useState('manual'); // 'ai' | 'manual'

    const generateWithAI = async () => {
        if (!novDescription.trim()) return;
        let apiKey = localStorage.getItem('claude_api_key');
        if (!apiKey) {
            apiKey = prompt('Ingresá tu API key de Claude (sk-ant-...):');
            if (!apiKey) return;
            localStorage.setItem('claude_api_key', apiKey);
        }
        setIsGeneratingAI(true);
        try {
            const response = await fetch('/api/generate-novedades', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ apiKey, description: novDescription })
            });
            if (!response.ok) throw new Error((await response.json()).error || 'Error en API');
            const data = await response.json();
            let jsonStr = data.content[0].text.trim();
            if (jsonStr.startsWith('```json')) jsonStr = jsonStr.replace(/^```json\n/, '').replace(/\n```$/, '');
            else if (jsonStr.startsWith('```')) jsonStr = jsonStr.replace(/^```\n/, '').replace(/\n```$/, '');
            const result = JSON.parse(jsonStr);
            const newSlides = result.slides.map((s, i) => ({
                id: Date.now() + i,
                title: s.title || '',
                subtitle: s.subtitle || '',
                body: s.body || '',
                tag: s.tag || 'NUEVO',
                palette: s.palette || 'azul',
                audioUrl: null
            }));
            setSlides(newSlides);
            setActiveIdx(0);
            setNovDescription('');
            setEditorTab('manual');
        } catch(err) {
            alert('Error: ' + err.message);
        } finally {
            setIsGeneratingAI(false);
        }
    };

    // ─── Descarga ZIP ─────────────────────────────────────────────────────────
    const downloadAsZip = async () => {
        if (typeof JSZip === 'undefined') {
            alert('JSZip no está cargado. Revisá tu conexión a internet y recargá la página.');
            return;
        }
        try {
            const canvas = document.createElement('canvas');
            canvas.width = fmt.w; canvas.height = fmt.h;
            const ctx = canvas.getContext('2d');
            const zip = new JSZip();
            const folderName = (slides[0]?.title || 'novedades').replace(/[^a-z0-9]/gi, '_').toLowerCase().substring(0, 50);
            const contentFolder = zip.folder(folderName).folder(format === 'carousel' ? 'carruseles' : 'reels');
            for (let i = 0; i < slides.length; i++) {
                if (format === 'carousel') drawSlideCarousel(ctx, slides[i], fmt.w, fmt.h);
                else drawSlideReel(ctx, slides[i], fmt.w, fmt.h);
                const base64 = canvas.toDataURL('image/png').replace(/^data:image\/png;base64,/, '');
                const slideTitle = (slides[i].title || `slide_${i+1}`).replace(/[^a-z0-9]/gi, '_').toLowerCase().substring(0, 40);
                contentFolder.file(`${i+1}_${slideTitle}.png`, base64, { base64: true });
            }
            const blob = await zip.generateAsync({ type: 'blob' });
            triggerDownload(URL.createObjectURL(blob), `${folderName}_${new Date().toISOString().slice(0,10)}.zip`);
            addToLibrary(format === 'carousel' ? 'Carrusel' : 'Video');
        } catch(err) {
            alert('Error al crear ZIP: ' + err.message);
        }
    };

    /* ─── Render canvas ─── */
    const renderCanvas = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        canvas.width = fmt.w;
        canvas.height = fmt.h;
        const ctx = canvas.getContext('2d');
        if (format === 'carousel') drawSlideCarousel(ctx, slide, fmt.w, fmt.h);
        else drawSlideReel(ctx, slide, fmt.w, fmt.h);
    }, [slide, format, fmt]);

    useEffect(() => { renderCanvas(); }, [renderCanvas]);

    /* ─── Slide helpers ─── */
    const updateSlide = (field, val) => {
        setSlides(prev => prev.map((s, i) => i === activeIdx ? { ...s, [field]: val } : s));
    };

    const addSlide = () => {
        const newSlide = { id: Date.now(), title: "Nueva Diapositiva", subtitle: "NeoMonitor", body: "Describí la novedad aquí.", tag: "NUEVO", palette: "azul" };
        setSlides(prev => [...prev, newSlide]);
        setActiveIdx(slides.length);
    };

    const removeSlide = (idx) => {
        if (slides.length === 1) return;
        setSlides(prev => prev.filter((_, i) => i !== idx));
        setActiveIdx(prev => Math.min(prev, slides.length - 2));
    };

    const moveSlide = (idx, dir) => {
        const newSlides = [...slides];
        const target = idx + dir;
        if (target < 0 || target >= newSlides.length) return;
        [newSlides[idx], newSlides[target]] = [newSlides[target], newSlides[idx]];
        setSlides(newSlides);
        setActiveIdx(target);
    };

    /* ─── Helper descarga blob ─── */
    const triggerDownload = (url, filename) => {
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 2000);
    };

    /* ─── Descarga PNG ─── */
    const downloadPNG = () => {
        // Si el canvas del preview no está montado, renderizar en offscreen
        let canvas = canvasRef.current;
        if (!canvas) {
            canvas = document.createElement('canvas');
            canvas.width = fmt.w; canvas.height = fmt.h;
            const ctx = canvas.getContext('2d');
            if (format === 'carousel') drawSlideCarousel(ctx, slide, fmt.w, fmt.h);
            else drawSlideReel(ctx, slide, fmt.w, fmt.h);
        }
        canvas.toBlob(blob => {
            triggerDownload(URL.createObjectURL(blob), `neomonitor-slide-${activeIdx + 1}-${format}.png`);
        }, 'image/png');
    };

    /* ─── Descarga todas las diapositivas ─── */
    const downloadAll = async () => {
        const canvas = document.createElement('canvas');
        canvas.width = fmt.w;
        canvas.height = fmt.h;
        const ctx = canvas.getContext('2d');

        for (let i = 0; i < slides.length; i++) {
            if (format === 'carousel') drawSlideCarousel(ctx, slides[i], fmt.w, fmt.h);
            else drawSlideReel(ctx, slides[i], fmt.w, fmt.h);
            await new Promise(resolve => {
                canvas.toBlob(blob => {
                    triggerDownload(URL.createObjectURL(blob), `neomonitor-slide-${i + 1}-${format}.png`);
                    resolve();
                }, 'image/png');
            });
            await new Promise(r => setTimeout(r, 300));
        }
    };

    /* ─── Generar Video (slides con transición) ─── */
    const generateVideo = async () => {
        if (recording) return;
        const canvas = document.createElement('canvas');
        canvas.width = fmt.w;
        canvas.height = fmt.h;
        const ctx = canvas.getContext('2d');

        const stream = canvas.captureStream(30);
        const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
            ? 'video/webm;codecs=vp9'
            : 'video/webm';
        mediaRecRef.current = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8000000 });
        chunksRef.current = [];
        mediaRecRef.current.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
        mediaRecRef.current.onstop = () => {
            const blob = new Blob(chunksRef.current, { type: mimeType });
            triggerDownload(URL.createObjectURL(blob), `neomonitor-novedades-${format}.webm`);
            setRecording(false);
            setRecProgress(0);
        };

        setRecording(true);
        mediaRecRef.current.start();

        const SLIDE_DURATION = slideDuration;
        const FADE_FRAMES = 18;       // frames de fade
        const FPS_INTERVAL = 1000 / 30;

        for (let s = 0; s < slides.length; s++) {
            // Fade in
            for (let f = 0; f <= FADE_FRAMES; f++) {
                ctx.globalAlpha = f / FADE_FRAMES;
                if (format === 'carousel') drawSlideCarousel(ctx, slides[s], fmt.w, fmt.h);
                else drawSlideReel(ctx, slides[s], fmt.w, fmt.h);
                await new Promise(r => setTimeout(r, FPS_INTERVAL));
            }
            ctx.globalAlpha = 1;
            // Pausa en el slide
            const holdStart = Date.now();
            while (Date.now() - holdStart < SLIDE_DURATION) {
                if (format === 'carousel') drawSlideCarousel(ctx, slides[s], fmt.w, fmt.h);
                else drawSlideReel(ctx, slides[s], fmt.w, fmt.h);
                setRecProgress(Math.round(((s + (Date.now() - holdStart) / SLIDE_DURATION) / slides.length) * 100));
                await new Promise(r => setTimeout(r, FPS_INTERVAL));
            }
            // Fade out (excepto último)
            if (s < slides.length - 1) {
                for (let f = FADE_FRAMES; f >= 0; f--) {
                    ctx.globalAlpha = f / FADE_FRAMES;
                    if (format === 'carousel') drawSlideCarousel(ctx, slides[s], fmt.w, fmt.h);
                    else drawSlideReel(ctx, slides[s], fmt.w, fmt.h);
                    await new Promise(r => setTimeout(r, FPS_INTERVAL));
                }
            }
        }
        mediaRecRef.current.stop();
    };

    return (
        <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>

            {/* ─── HEADER ─── */}
            <header className="glass flex-shrink-0 px-6 py-3 flex items-center justify-between border-b border-white/5">
                <div className="flex items-center gap-3">
                    <a href="index.html" className="w-8 h-8 bg-slate-800 hover:bg-slate-700 rounded-xl flex items-center justify-center text-slate-400 transition-colors">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"/></svg>
                    </a>
                    <div className="w-8 h-8 bg-amber-500 rounded-xl flex items-center justify-center font-black text-xs text-black">NM</div>
                    <div>
                        <h1 className="text-xs font-black uppercase tracking-widest leading-none">Novedades Generator</h1>
                        <p className="text-[9px] text-slate-600 font-bold uppercase tracking-widest mt-0.5">NeoMonitor Expert Suite</p>
                    </div>
                </div>
                <div className="flex items-center gap-2">
                    {/* FORMAT SWITCHER */}
                    <div className="flex items-center gap-1 glass rounded-xl p-1">
                        {Object.entries(FORMATS).map(([key, f]) => (
                            <button key={key} onClick={() => setFormat(key)}
                                className={`btn px-3 py-1.5 rounded-lg text-[10px] ${format === key ? 'bg-amber-500 text-black' : 'text-slate-400 hover:text-white'}`}>
                                {f.icon} {f.label}
                            </button>
                        ))}
                    </div>
                    {/* BIBLIOTECA */}
                    <button onClick={() => setMainTab(mainTab === 'library' ? 'editor' : 'library')}
                        className={`btn px-3 py-1.5 rounded-xl text-[10px] border ${mainTab === 'library' ? 'bg-amber-500/20 text-amber-400 border-amber-500/30' : 'bg-slate-800 text-slate-400 border-white/5 hover:text-white'}`}>
                        📚 Biblioteca {library.length > 0 ? `(${library.length})` : ''}
                    </button>
                </div>
            </header>

            {/* ─── BODY ─── */}
            <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>

                {/* ══ PANEL IZQUIERDO — Lista de slides ══ */}
                <div className="flex flex-col border-r border-white/5 flex-shrink-0" style={{ width: '200px' }}>

                    {/* Header lista */}
                    <div className="p-3 border-b border-white/5 flex items-center justify-between flex-shrink-0">
                        <span className="text-[9px] font-black text-slate-600 uppercase tracking-widest">Slides ({slides.length})</span>
                        <button onClick={addSlide} className="btn px-2 py-1 bg-amber-500/10 text-amber-400 hover:bg-amber-500/20 rounded-lg border border-amber-500/20 text-[9px]">+</button>
                    </div>
                    {/* Lista */}
                    <div className="flex-1 overflow-y-auto py-2">
                        {slides.map((s, i) => (
                            <div key={s.id} onClick={() => setActiveIdx(i)}
                                className={`slide-item flex items-center gap-2 px-3 py-2.5 ${i === activeIdx ? 'active' : ''}`}>
                                <div className="w-5 h-5 rounded flex items-center justify-center text-[9px] font-black flex-shrink-0"
                                    style={{ background: PALETTES[s.palette]?.accent + '30', color: PALETTES[s.palette]?.accent }}>
                                    {i + 1}
                                </div>
                                <span className="text-[11px] font-semibold text-slate-300 truncate flex-1">{s.title}</span>
                                <div className="flex gap-0.5 opacity-0 group-hover:opacity-100">
                                    <button onClick={e => { e.stopPropagation(); moveSlide(i, -1); }} className="text-slate-700 hover:text-slate-300 p-0.5 text-[10px]">↑</button>
                                    <button onClick={e => { e.stopPropagation(); moveSlide(i, 1); }} className="text-slate-700 hover:text-slate-300 p-0.5 text-[10px]">↓</button>
                                    <button onClick={e => { e.stopPropagation(); removeSlide(i); }} className="text-slate-700 hover:text-red-400 p-0.5 text-[10px]">✕</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>

                {/* ══ PANEL CENTRAL — Editor (el más importante) ══ */}
                <div className="flex flex-col border-r border-white/5 flex-shrink-0 overflow-hidden" style={{ width: '420px' }}>

                    {/* Tabs editor */}
                    <div className="flex gap-1 p-3 border-b border-white/5 flex-shrink-0">
                        <button onClick={() => setEditorTab('ai')}
                            className={`btn flex-1 py-2 rounded-xl text-[10px] border ${editorTab === 'ai' ? 'bg-purple-600/20 text-purple-300 border-purple-500/30' : 'bg-slate-800/50 text-slate-500 border-white/5 hover:text-slate-300'}`}>
                            ✨ Generar con IA
                        </button>
                        <button onClick={() => setEditorTab('manual')}
                            className={`btn flex-1 py-2 rounded-xl text-[10px] border ${editorTab === 'manual' ? 'bg-amber-500/20 text-amber-300 border-amber-500/30' : 'bg-slate-800/50 text-slate-500 border-white/5 hover:text-slate-300'}`}>
                            ✏️ Editor — Slide {activeIdx + 1}
                        </button>
                    </div>

                    {/* Contenido del tab */}
                    <div className="flex-1 overflow-y-auto p-4 space-y-4">

                        {/* ── Tab IA ── */}
                        {editorTab === 'ai' && (
                            <div className="space-y-4 fade-in">
                                <div className="p-3 rounded-xl bg-purple-900/20 border border-purple-500/20">
                                    <p className="text-[11px] text-purple-300 leading-relaxed">
                                        Describí la novedad o característica de NeoMonitor. Claude genera automáticamente todos los slides del carrusel.
                                    </p>
                                </div>
                                <div>
                                    <label className="block text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-2">Describí la novedad</label>
                                    <textarea
                                        value={novDescription}
                                        onChange={e => setNovDescription(e.target.value)}
                                        rows={6}
                                        className="w-full px-3 py-3 rounded-xl text-sm resize-none leading-relaxed"
                                        placeholder="Ej: Agregamos soporte para exportar reels en formato MP4 compatible con Instagram, con audio personalizado y transiciones automáticas entre slides..."
                                    />
                                </div>
                                <button onClick={generateWithAI} disabled={isGeneratingAI || !novDescription.trim()}
                                    className="w-full btn py-4 rounded-2xl text-[11px] font-black uppercase tracking-widest disabled:opacity-40 flex items-center justify-center gap-2"
                                    style={{ background: isGeneratingAI ? 'rgba(168,85,247,0.15)' : 'rgba(168,85,247,0.25)', color: '#c084fc', border: '1px solid rgba(168,85,247,0.3)' }}>
                                    {isGeneratingAI
                                        ? <><div className="w-3.5 h-3.5 border-2 border-purple-300/30 border-t-purple-300 rounded-full animate-spin"/>Generando slides...</>
                                        : <>✨ Generar Slides con IA</>
                                    }
                                </button>
                                <p className="text-[9px] text-slate-700 text-center">Genera 3 a 5 slides con título, subtítulo, texto y paleta de colores automática.</p>
                            </div>
                        )}

                        {/* ── Tab Manual ── */}
                        {editorTab === 'manual' && (
                            <div className="space-y-4 fade-in">

                                {/* Paleta */}
                                <div>
                                    <label className="block text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-2">Paleta de Color</label>
                                    <div className="flex flex-wrap gap-2">
                                        {Object.entries(PALETTES).map(([key, pal]) => (
                                            <button key={key} onClick={() => updateSlide('palette', key)}
                                                className={`w-7 h-7 rounded-lg border-2 transition-all ${slide.palette === key ? 'border-white scale-110' : 'border-transparent'}`}
                                                style={{ background: pal.accent }} title={pal.name} />
                                        ))}
                                    </div>
                                </div>

                                {/* Tag */}
                                <div>
                                    <label className="block text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1.5">Etiqueta</label>
                                    <input type="text" value={slide.tag} onChange={e => updateSlide('tag', e.target.value)}
                                        className="w-full px-3 py-2.5 rounded-xl text-sm" placeholder="NUEVO, UPDATE, MEJORA..." />
                                </div>

                                {/* Título */}
                                <div>
                                    <label className="block text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1.5">Título</label>
                                    <textarea value={slide.title} onChange={e => updateSlide('title', e.target.value)} rows={2}
                                        className="w-full px-3 py-2.5 rounded-xl text-sm resize-none" placeholder="Título principal" />
                                </div>

                                {/* Subtítulo */}
                                <div>
                                    <label className="block text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1.5">Subtítulo</label>
                                    <input type="text" value={slide.subtitle} onChange={e => updateSlide('subtitle', e.target.value)}
                                        className="w-full px-3 py-2.5 rounded-xl text-sm" placeholder="Contexto o versión" />
                                </div>

                                {/* Cuerpo */}
                                <div>
                                    <label className="block text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1.5">Texto Principal</label>
                                    <textarea value={slide.body} onChange={e => updateSlide('body', e.target.value)} rows={6}
                                        className="w-full px-3 py-2.5 rounded-xl text-sm resize-none leading-relaxed"
                                        placeholder="Describí la novedad o característica..." />
                                </div>

                                {/* Audio por slide */}
                                <div>
                                    <label className="block text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1.5">🔊 Audio para este slide</label>
                                    <input type="file" accept="audio/*" onChange={e => {
                                        const file = e.target.files?.[0];
                                        if (file) {
                                            const reader = new FileReader();
                                            reader.onload = (ev) => updateSlide('audioUrl', ev.target?.result);
                                            reader.readAsDataURL(file);
                                        }
                                    }} className="w-full px-3 py-2 rounded-xl text-sm" />
                                    {slide.audioUrl && (
                                        <div className="mt-2 flex items-center gap-2">
                                            <audio ref={audioRef} src={slide.audioUrl} className="w-full" controls />
                                            <button onClick={() => updateSlide('audioUrl', null)} className="text-red-400 hover:text-red-500 text-sm">✕</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* ── Acciones de exportación (fijo abajo) ── */}
                    <div className="border-t border-white/5 p-3 space-y-2 flex-shrink-0">
                        {/* Audio por defecto */}
                        <div className="flex items-center gap-2">
                            <label className="flex-1 flex items-center gap-2 bg-slate-950 border border-white/8 rounded-xl px-3 py-2 cursor-pointer hover:border-amber-500/40 transition-all">
                                <span className="text-[9px] font-bold text-amber-500">🎵</span>
                                <span className="text-[9px] font-bold text-slate-500 truncate flex-1">{defaultAudioFileName || 'Audio defecto Reel…'}</span>
                                <input type="file" accept="audio/mp3,audio/mpeg,audio/*" onChange={handleDefaultAudio} className="hidden"/>
                            </label>
                            {defaultAudioFileName && <button onClick={removeDefaultAudio} className="text-[9px] text-slate-700 hover:text-red-400 transition-colors shrink-0">✕</button>}
                        </div>
                        <div className="grid grid-cols-3 gap-1.5">
                            <button onClick={downloadPNG} className="btn py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-[9px] border border-white/5">⬇ PNG</button>
                            <button onClick={downloadAsZip} className="btn py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-[9px] border border-white/5">📦 ZIP</button>
                            <button onClick={generateVideo} disabled={recording}
                                className={`btn py-2.5 rounded-xl text-[9px] border ${recording ? 'bg-red-500/15 text-red-400 border-red-500/20' : 'bg-amber-500/15 text-amber-400 hover:bg-amber-500/25 border-amber-500/20'}`}>
                                {recording ? `${recProgress}%` : '▶ Video'}
                            </button>
                        </div>
                        {recording && <div className="w-full h-1 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-amber-500 transition-all" style={{ width: `${recProgress}%` }} /></div>}
                        <div className="flex gap-1">
                            {[1500, 2000, 3000, 4000, 5000].map(ms => (
                                <button key={ms} onClick={() => setSlideDuration(ms)} disabled={recording}
                                    className={`btn flex-1 py-1.5 rounded-lg text-[9px] border ${slideDuration === ms ? 'bg-amber-500 text-black border-amber-500' : 'bg-slate-800 text-slate-600 border-slate-700'}`}>
                                    {ms/1000}s
                                </button>
                            ))}
                        </div>
                    </div>
                </div>

                {/* ══ PANEL DERECHO — Preview + Biblioteca ══ */}
                <div className="flex flex-1 flex-col bg-slate-950/50 p-6 gap-4 overflow-y-auto">

                    {mainTab === 'library' && (
                        <div className="w-full">
                            {library.length === 0
                                ? <div className="border-2 border-dashed border-slate-800 rounded-3xl p-12 text-center text-slate-700">
                                    <p className="text-xs font-bold uppercase tracking-widest">Biblioteca vacía<br/><span className="text-amber-500/50">Los ZIPs descargados aparecerán acá</span></p>
                                  </div>
                                : <div className="space-y-3">
                                    {library.map(item => (
                                        <div key={item.id} className="glass p-4 rounded-2xl">
                                            <div className="flex items-start justify-between gap-3">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-1 flex-wrap">
                                                        <span className="text-[9px] font-black px-2 py-1 rounded-full bg-amber-500/15 text-amber-400 uppercase">{item.type}</span>
                                                        <span className="text-[9px] text-slate-600">{item.slideCount} slides</span>
                                                        <select value={item.status} onChange={e => updateLibraryStatus(item.id, e.target.value)}
                                                            className="text-[9px] font-black px-2 py-1 rounded-full border-0 cursor-pointer"
                                                            style={{background:'rgba(255,255,255,0.05)', color: item.status==='Publicado'?'#818cf8':item.status==='Listo'?'#4ade80':'#94a3b8'}}>
                                                            <option value="Borrador">Borrador</option>
                                                            <option value="Listo">Listo</option>
                                                            <option value="Publicado">Publicado</option>
                                                        </select>
                                                    </div>
                                                    <p className="font-bold text-sm text-white mb-0.5">{item.title}</p>
                                                    <p className="text-[11px] text-slate-600">{item.dateTime}</p>
                                                </div>
                                                <div className="flex gap-2 shrink-0">
                                                    <button onClick={() => regenerateFromLibrary(item)}
                                                        className="text-[10px] font-bold text-amber-400 hover:text-amber-300 px-3 py-1.5 rounded-lg bg-amber-500/10 border border-amber-500/20 transition-colors">
                                                        ↻ Recargar
                                                    </button>
                                                    <button onClick={() => deleteLibraryItem(item.id)}
                                                        className="text-[10px] font-bold text-slate-600 hover:text-red-400 px-3 py-1.5 rounded-lg bg-white/5 border border-white/5 transition-colors">
                                                        ✕
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                  </div>
                            }
                        </div>
                    )}

                    {mainTab === 'editor' && <>

                    {/* Info formato */}

                    <div className="flex items-center gap-3 text-[10px] font-black text-slate-500 uppercase tracking-widest">
                        <span>{fmt.icon} {fmt.label}</span>
                        <span className="text-slate-700">·</span>
                        <span>{fmt.w} × {fmt.h}px</span>
                        <span className="text-slate-700">·</span>
                        <span style={{ color: PALETTES[slide.palette]?.accent }}>{PALETTES[slide.palette]?.name}</span>
                    </div>

                    {/* Canvas preview */}
                    <div className="relative flex items-center justify-center"
                        style={{
                            width: format === 'carousel' ? 'min(480px, 90vw)' : 'min(270px, 50vw)',
                            height: format === 'carousel' ? 'min(480px, 90vw)' : 'min(480px, 90vh)',
                            background: 'rgba(0,0,0,0.4)',
                            borderRadius: '16px',
                            overflow: 'hidden',
                            border: '1px solid rgba(255,255,255,0.08)',
                        }}>
                        <canvas ref={canvasRef}
                            style={{ width: '100%', height: '100%', objectFit: 'contain', display: 'block' }} />
                    </div>

                    {/* Navegación rápida */}
                    <div className="flex items-center gap-3">
                        <button onClick={() => setActiveIdx(i => Math.max(0, i - 1))} disabled={activeIdx === 0}
                            className="btn w-9 h-9 glass rounded-xl flex items-center justify-center text-slate-400 disabled:opacity-30">←</button>
                        <div className="flex gap-1.5">
                            {slides.map((_, i) => (
                                <button key={i} onClick={() => setActiveIdx(i)}
                                    className={`w-2 h-2 rounded-full transition-all ${i === activeIdx ? 'bg-amber-500 scale-125' : 'bg-slate-700 hover:bg-slate-500'}`} />
                            ))}
                        </div>
                        <button onClick={() => setActiveIdx(i => Math.min(slides.length - 1, i + 1))} disabled={activeIdx === slides.length - 1}
                            className="btn w-9 h-9 glass rounded-xl flex items-center justify-center text-slate-400 disabled:opacity-30">→</button>
                    </div>

                    {/* Tip */}
                    <p className="text-[10px] text-slate-700 text-center max-w-sm">
                        Editá el contenido en el panel izquierdo. El preview se actualiza en tiempo real.
                        Descargá como PNG para carruseles o generá el video para reels e historias.
                    </p>
                    </>}
                </div>
            </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

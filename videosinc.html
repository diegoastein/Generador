<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoMonitor | Video Sync 9:16</title>
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        :root {
            --bg-dark: #020617;
            --sidebar-bg: rgba(15, 23, 42, 0.5);
            --accent-amber: #f59e0b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input[type="text"] {
            background: #020617 !important;
            border: 1px solid #1e293b !important;
            color: white !important;
            outline: none;
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            border-color: #3b82f6 !important;
        }

        .canvas-container {
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .canvas-glow {
            position: absolute;
            inset: -1px;
            background: linear-gradient(to bottom, rgba(59, 130, 246, 0.2), transparent);
            border-radius: 40px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Iconos SVG de Lucide para evitar dependencias de componentes externos en el renderizado de React sin compilador
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [monitorVideo, setMonitorVideo] = useState(null);
            const [controlVideo, setControlVideo] = useState(null);
            const [isRecording, setIsRecording] = useState(false);
            const [isPlaying, setIsPlaying] = useState(false);
            const [labels, setLabels] = useState({ top: 'VISTA MONITOR', bottom: 'VISTA CONTROL' });
            
            const canvasRef = useRef(null);
            const monitorRef = useRef(null);
            const controlRef = useRef(null);
            const recorderRef = useRef(null);
            const chunksRef = useRef([]);

            // Loop de renderizado en el Canvas
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationId;

                const render = () => {
                    // Fondo oscuro
                    ctx.fillStyle = '#020617';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Dibujar Video Superior (Monitor)
                    if (monitorRef.current && monitorRef.current.readyState >= 2) {
                        ctx.drawImage(monitorRef.current, 0, 0, 1080, 960);
                    } else {
                        ctx.fillStyle = '#0f172a';
                        ctx.fillRect(0, 0, 1080, 960);
                    }

                    // Dibujar Video Inferior (Control)
                    if (controlRef.current && controlRef.current.readyState >= 2) {
                        ctx.drawImage(controlRef.current, 0, 960, 1080, 960);
                    } else {
                        ctx.fillStyle = '#1e293b';
                        ctx.fillRect(0, 960, 1080, 960);
                    }

                    // Estilo de etiquetas (Badges)
                    ctx.font = '900 44px Inter, sans-serif';
                    ctx.textBaseline = 'top';

                    // Etiqueta Superior
                    const topWidth = ctx.measureText(labels.top).width;
                    ctx.fillStyle = 'rgba(37, 99, 235, 0.9)';
                    // Polyfill para roundRect si no existe en navegadores viejos
                    if (ctx.roundRect) {
                        ctx.beginPath();
                        ctx.roundRect(40, 40, topWidth + 60, 90, 20);
                        ctx.fill();
                    } else {
                        ctx.fillRect(40, 40, topWidth + 60, 90);
                    }
                    ctx.fillStyle = 'white';
                    ctx.fillText(labels.top, 70, 62);

                    // Etiqueta Inferior
                    const botWidth = ctx.measureText(labels.bottom).width;
                    ctx.fillStyle = 'rgba(37, 99, 235, 0.9)';
                    if (ctx.roundRect) {
                        ctx.beginPath();
                        ctx.roundRect(40, 1000, botWidth + 60, 90, 20);
                        ctx.fill();
                    } else {
                        ctx.fillRect(40, 1000, botWidth + 60, 90);
                    }
                    ctx.fillStyle = 'white';
                    ctx.fillText(labels.bottom, 70, 1022);

                    // Marca de agua
                    ctx.font = '700 32px Inter, sans-serif';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.fillText('NEOMONITOR.PRO', 760, 1840);

                    animationId = requestAnimationFrame(render);
                };

                render();
                return () => cancelAnimationFrame(animationId);
            }, [labels]);

            // Inicializar iconos de lucide después de cada cambio de estado que afecte al DOM
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const handleFileChange = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                if (type === 'monitor') setMonitorVideo(url);
                else setControlVideo(url);
            };

            const togglePlayback = () => {
                if (isPlaying) {
                    monitorRef.current?.pause();
                    controlRef.current?.pause();
                } else {
                    monitorRef.current?.play();
                    controlRef.current?.play();
                }
                setIsPlaying(!isPlaying);
            };

            const startRecording = () => {
                if (!monitorVideo || !controlVideo) return;
                
                chunksRef.current = [];
                const stream = canvasRef.current.captureStream(30);
                
                // Intentar códec compatible
                let options = { mimeType: 'video/webm; codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm' };
                }
                
                try {
                    recorderRef.current = new MediaRecorder(stream, options);
                } catch (e) {
                    recorderRef.current = new MediaRecorder(stream);
                }

                recorderRef.current.ondataavailable = (e) => {
                    if (e.data.size > 0) chunksRef.current.push(e.data);
                };

                recorderRef.current.onstop = () => {
                    const blob = new Blob(chunksRef.current, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `NM_SyncDemo_${Date.now()}.webm`;
                    a.click();
                };

                // Sincronizar inicio
                monitorRef.current.currentTime = 0;
                controlRef.current.currentTime = 0;
                monitorRef.current.play();
                controlRef.current.play();
                setIsPlaying(true);
                
                recorderRef.current.start();
                setIsRecording(true);
            };

            const stopRecording = () => {
                if (recorderRef.current && recorderRef.current.state !== 'inactive') {
                    recorderRef.current.stop();
                }
                setIsRecording(false);
                monitorRef.current?.pause();
                controlRef.current?.pause();
                setIsPlaying(false);
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <aside className="w-full md:w-72 bg-slate-900/50 border-r border-white/5 p-6 flex flex-col items-center md:items-start shrink-0 backdrop-blur-xl z-20">
                        <div className="flex items-center gap-3 mb-12">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-blue-500/40">NM</div>
                            <span className="font-black text-xl tracking-tighter uppercase">Expert Suite</span>
                        </div>
                        
                        <nav className="space-y-3 w-full">
                            <div className="p-4 rounded-2xl bg-amber-500/10 border border-amber-500/30 flex items-center gap-4 text-amber-500">
                                <Icon name="video" />
                                <span className="font-bold text-sm">Video Sync 9:16</span>
                            </div>
                        </nav>
                        
                        <div className="mt-auto hidden md:block pt-8 border-t border-white/5 w-full">
                            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">v2.1 Stable</p>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-6 md:p-12 overflow-y-auto">
                        <header className="mb-10 max-w-6xl mx-auto">
                            <div className="flex items-center gap-4 mb-2">
                                <h2 className="text-4xl font-black tracking-tight uppercase">Demos <span className="text-amber-500">Sincronizadas</span></h2>
                                <div className="bg-amber-500/20 text-amber-500 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">Expert Sync</div>
                            </div>
                            <p className="text-slate-400">Combina el monitor y el control en un formato vertical para redes sociales.</p>
                        </header>

                        <div className="grid lg:grid-cols-2 gap-12 max-w-6xl mx-auto items-start">
                            
                            {/* Controls Panel */}
                            <div className="space-y-6">
                                <div className="bg-slate-900/80 border border-white/5 p-8 rounded-[32px] space-y-6 backdrop-blur-md">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Video Monitor (Arriba)</label>
                                            <div className="relative group">
                                                <input 
                                                    type="file" 
                                                    accept="video/*" 
                                                    onChange={(e) => handleFileChange(e, 'monitor')}
                                                    className="absolute inset-0 opacity-0 cursor-pointer z-10"
                                                />
                                                <div className={`p-4 rounded-xl border-2 border-dashed ${monitorVideo ? 'border-blue-500 bg-blue-500/5' : 'border-slate-800 bg-slate-950'} transition-all text-center`}>
                                                    <div className="mb-2 flex justify-center">
                                                        <Icon name="monitor" className={monitorVideo ? 'text-blue-500' : 'text-slate-700'} />
                                                    </div>
                                                    <span className="text-xs font-bold uppercase tracking-tight">
                                                        {monitorVideo ? 'Cambiado' : 'Subir Video'}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Video Control (Abajo)</label>
                                            <div className="relative group">
                                                <input 
                                                    type="file" 
                                                    accept="video/*" 
                                                    onChange={(e) => handleFileChange(e, 'control')}
                                                    className="absolute inset-0 opacity-0 cursor-pointer z-10"
                                                />
                                                <div className={`p-4 rounded-xl border-2 border-dashed ${controlVideo ? 'border-blue-500 bg-blue-500/5' : 'border-slate-800 bg-slate-950'} transition-all text-center`}>
                                                    <div className="mb-2 flex justify-center">
                                                        <Icon name="zap" className={controlVideo ? 'text-blue-500' : 'text-slate-700'} />
                                                    </div>
                                                    <span className="text-xs font-bold uppercase tracking-tight">
                                                        {controlVideo ? 'Cambiado' : 'Subir Video'}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-4 pt-4 border-t border-white/5">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Etiqueta Sup.</label>
                                                <input 
                                                    type="text" 
                                                    value={labels.top}
                                                    onChange={(e) => setLabels({...labels, top: e.target.value.toUpperCase()})}
                                                    className="w-full rounded-xl p-3 text-xs font-bold transition-all"
                                                />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Etiqueta Inf.</label>
                                                <input 
                                                    type="text" 
                                                    value={labels.bottom}
                                                    onChange={(e) => setLabels({...labels, bottom: e.target.value.toUpperCase()})}
                                                    className="w-full rounded-xl p-3 text-xs font-bold transition-all"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex gap-4">
                                        <button 
                                            onClick={togglePlayback}
                                            className="flex-1 bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95"
                                        >
                                            <Icon name={isPlaying ? "pause" : "play"} size={18} />
                                            <span>{isPlaying ? 'Pausar' : 'Previsualizar'}</span>
                                        </button>

                                        <button 
                                            onClick={isRecording ? stopRecording : startRecording}
                                            disabled={!monitorVideo || !controlVideo}
                                            className={`flex-[1.5] p-4 rounded-2xl font-black uppercase tracking-widest text-sm flex items-center justify-center gap-3 transition-all active:scale-95 shadow-xl ${
                                                isRecording 
                                                    ? 'bg-red-600 hover:bg-red-500 shadow-red-600/20' 
                                                    : 'bg-amber-600 hover:bg-amber-500 shadow-amber-600/20 disabled:opacity-30 disabled:grayscale'
                                            }`}
                                        >
                                            {isRecording ? (
                                                <>
                                                    <div className="w-3 h-3 bg-white rounded-full animate-pulse" />
                                                    <span>Detener Grabación</span>
                                                </>
                                            ) : (
                                                <>
                                                    <Icon name="download" size={18} />
                                                    <span>Exportar Video</span>
                                                </>
                                            )}
                                        </button>
                                    </div>
                                </div>
                                
                                <p className="text-[10px] text-center text-slate-600 font-bold uppercase tracking-[0.2em]">
                                    El video se generará en formato 1080x1920 (9:16)
                                </p>
                            </div>

                            {/* Preview Panel */}
                            <div className="flex flex-col items-center">
                                <div className="canvas-container group">
                                    <div className="canvas-glow"></div>
                                    <canvas 
                                        ref={canvasRef} 
                                        width="1080" 
                                        height="1920" 
                                        className="relative w-[300px] md:w-[350px] aspect-[9/16] bg-black rounded-[40px] border-[10px] border-slate-900 shadow-2xl"
                                    />
                                </div>
                                
                                {/* Hidden Video Elements for Sourcing */}
                                <video ref={monitorRef} src={monitorVideo} loop muted className="hidden" crossOrigin="anonymous" />
                                <video ref={controlRef} src={controlVideo} loop muted className="hidden" crossOrigin="anonymous" />
                            </div>

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

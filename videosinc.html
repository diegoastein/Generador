<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoMonitor | Video Sync 9:16</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; overflow: hidden; }
        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:#1e293b; border-radius:10px; }
        input[type="text"] { background:#020617 !important; border:1px solid #1e293b !important; color:white !important; outline:none; transition:all .2s; }
        input[type="text"]:focus { border-color:#f59e0b !important; }
        .glass { background:rgba(15,23,42,0.8); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ── Dibuja un video con contain (letterbox/pillarbox — sin crop, sin distorsión) ──
function drawVideoCover(ctx, video, dx, dy, dw, dh) {
    ctx.fillStyle = '#000000';
    ctx.fillRect(dx, dy, dw, dh);
    if (!video || video.readyState < 2) {
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(dx, dy, dw, dh);
        ctx.fillStyle = '#1e293b';
        ctx.font = 'bold 40px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Sin video', dx + dw/2, dy + dh/2);
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        return;
    }
    const vw = video.videoWidth  || 1;
    const vh = video.videoHeight || 1;
    const vRatio = vw / vh;
    const dRatio = dw / dh;
    let rw, rh;
    if (vRatio > dRatio) {
        rw = dw;
        rh = dw / vRatio;
    } else {
        rh = dh;
        rw = dh * vRatio;
    }
    const rx = dx + (dw - rw) / 2;
    const ry = dy + (dh - rh) / 2;
    ctx.drawImage(video, 0, 0, vw, vh, rx, ry, rw, rh);
}

// ── Badge redondeado ──────────────────────────────────────────────────────────
function drawBadge(ctx, text, x, y) {
    ctx.font = 'bold 40px system-ui, sans-serif';
    const tw = ctx.measureText(text).width;
    const bw = tw + 56, bh = 76;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(x, y, bw, bh, 18) : ctx.rect(x, y, bw, bh);
    ctx.fillStyle = 'rgba(37,99,235,0.92)'; ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x + 28, y + bh/2);
    ctx.textBaseline = 'top';
}

// ── Render frame al canvas 1080×1920 ─────────────────────────────────────────
function renderFrame(ctx, monVid, ctrlVid, labels) {
    const W = 1080, H = 1920, HALF = H / 2;

    ctx.fillStyle = '#020617';
    ctx.fillRect(0, 0, W, H);

    // Mitad superior — monitor
    drawVideoCover(ctx, monVid, 0, 0, W, HALF);

    // Mitad inferior — control
    drawVideoCover(ctx, ctrlVid, 0, HALF, W, HALF);

    // Línea divisoria
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(0, HALF - 2, W, 4);

    // Badges
    drawBadge(ctx, labels.top,    40, 40);
    drawBadge(ctx, labels.bottom, 40, HALF + 40);

    // Marca de agua
    ctx.font = 'bold 28px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillText('NEOMONITOR.PRO', W - 40, H - 40);
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
}

// ── App ───────────────────────────────────────────────────────────────────────
const App = () => {
    const [monitorSrc, setMonitorSrc]   = useState(null);
    const [controlSrc, setControlSrc]   = useState(null);
    const [isPlaying,  setIsPlaying]    = useState(false);
    const [isRecording,setIsRecording]  = useState(false);
    const [recStatus,  setRecStatus]    = useState('');
    const [labels, setLabels] = useState({ top: 'VISTA MONITOR', bottom: 'VISTA CONTROL' });

    const canvasRef  = useRef(null);
    const monRef     = useRef(null);
    const ctrlRef    = useRef(null);
    const rafRef     = useRef(null);
    const recRef     = useRef(null);
    const chunksRef  = useRef([]);

    // ── Loop de render ────────────────────────────────────────────────────────
    useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        const loop = () => {
            renderFrame(ctx, monRef.current, ctrlRef.current, labels);
            rafRef.current = requestAnimationFrame(loop);
        };
        rafRef.current = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(rafRef.current);
    }, [labels]);

    // ── Play / Pause ──────────────────────────────────────────────────────────
    const togglePlay = () => {
        const mon  = monRef.current;
        const ctrl = ctrlRef.current;
        if (!mon || !ctrl) return;
        if (isPlaying) {
            mon.pause(); ctrl.pause();
            setIsPlaying(false);
        } else {
            // Sincronizar desde 0
            mon.currentTime  = 0;
            ctrl.currentTime = 0;
            Promise.all([mon.play(), ctrl.play()])
                .catch(e => console.warn('play error:', e));
            setIsPlaying(true);
        }
    };

    // ── Grabación ─────────────────────────────────────────────────────────────
    const startRecording = () => {
        const canvas = canvasRef.current;
        const mon    = monRef.current;
        const ctrl   = ctrlRef.current;
        if (!canvas || !mon || !ctrl) return;

        chunksRef.current = [];

        // Stream desde canvas a 30fps
        const stream = canvas.captureStream(30);

        // Elegir codec disponible
        const mime = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm']
            .find(m => MediaRecorder.isTypeSupported(m)) || '';

        try {
            recRef.current = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
        } catch(e) {
            recRef.current = new MediaRecorder(stream);
        }

        recRef.current.ondataavailable = e => {
            if (e.data && e.data.size > 0) chunksRef.current.push(e.data);
        };

        recRef.current.onstop = () => {
            setRecStatus('Preparando descarga…');
            const blob = new Blob(chunksRef.current, { type: 'video/webm' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href     = url;
            a.download = `NM_Sync_${Date.now()}.webm`;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 5000);
            setRecStatus('');
            setIsRecording(false);
            setIsPlaying(false);
        };

        // Sincronizar y arrancar
        mon.currentTime  = 0;
        ctrl.currentTime = 0;
        Promise.all([mon.play(), ctrl.play()])
            .then(() => {
                recRef.current.start(100); // chunk cada 100ms
                setIsRecording(true);
                setIsPlaying(true);
                setRecStatus('Grabando…');
            })
            .catch(e => {
                console.error('Error iniciando grabación:', e);
                setRecStatus('Error al iniciar.');
            });
    };

    const stopRecording = () => {
        if (recRef.current && recRef.current.state !== 'inactive') {
            monRef.current?.pause();
            ctrlRef.current?.pause();
            recRef.current.stop(); // dispara onstop → descarga
            setRecStatus('Procesando…');
        }
    };

    const handleFile = (e, type) => {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        if (type === 'monitor') setMonitorSrc(url);
        else setControlSrc(url);
        setIsPlaying(false);
        setIsRecording(false);
    };

    // ── UI ────────────────────────────────────────────────────────────────────
    const FileZone = ({ label, loaded, type, icon }) => (
        <div className="space-y-2">
            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{label}</p>
            <label className={`relative flex flex-col items-center justify-center p-5 rounded-2xl border-2 border-dashed cursor-pointer transition-all
                ${loaded ? 'border-amber-500/60 bg-amber-500/5' : 'border-slate-800 bg-slate-950 hover:border-slate-600'}`}>
                <input type="file" accept="video/*" onChange={e => handleFile(e, type)} className="absolute inset-0 opacity-0 cursor-pointer" />
                {icon}
                <span className={`text-xs font-bold uppercase mt-2 ${loaded ? 'text-amber-400' : 'text-slate-600'}`}>
                    {loaded ? '✓ Cargado' : 'Subir video'}
                </span>
            </label>
        </div>
    );

    const canRecord = !!monitorSrc && !!controlSrc && !isRecording;
    const canPlay   = !!monitorSrc && !!controlSrc;

    return (
        <div className="min-h-screen flex" style={{height:'100vh',overflow:'hidden'}}>

            {/* Sidebar */}
            <aside className="w-64 bg-slate-900/50 border-r border-white/5 p-6 flex flex-col shrink-0">
                <div className="flex items-center gap-3 mb-10">
                    <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-blue-500/40">NM</div>
                    <span className="font-black text-xl tracking-tighter uppercase">NeoMonitor</span>
                </div>
                <div className="p-4 rounded-2xl bg-amber-500/10 border border-amber-500/30 flex items-center gap-3 text-amber-400">
                    <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M15 10l4.553-2.277A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <span className="font-bold text-sm">Video Sync 9:16</span>
                </div>
                <div className="mt-auto pt-8 border-t border-white/5">
                    <p className="text-[10px] text-slate-600 font-bold uppercase tracking-widest">v3.0 Stable</p>
                </div>
            </aside>

            {/* Main */}
            <main className="flex-1 flex gap-8 p-10 overflow-hidden">

                {/* Panel izquierdo */}
                <div className="w-80 shrink-0 flex flex-col gap-5 overflow-y-auto">
                    <div>
                        <h2 className="text-3xl font-black uppercase tracking-tight mb-1">
                            Demos <span className="text-amber-500">Sync</span>
                        </h2>
                        <p className="text-slate-400 text-xs">Combina dos videos en formato 9:16 vertical.</p>
                    </div>

                    <div className="glass p-5 rounded-[24px] space-y-4">
                        <FileZone label="Video superior (Monitor)" loaded={!!monitorSrc} type="monitor"
                            icon={<svg className={`w-8 h-8 ${monitorSrc ? 'text-amber-400' : 'text-slate-700'}`} fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>} />

                        <FileZone label="Video inferior (Control remoto)" loaded={!!controlSrc} type="control"
                            icon={<svg className={`w-8 h-8 ${controlSrc ? 'text-amber-400' : 'text-slate-700'}`} fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M12 18.5a6.5 6.5 0 100-13 6.5 6.5 0 000 13z"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>} />
                    </div>

                    {/* Etiquetas */}
                    <div className="glass p-5 rounded-[24px] space-y-3">
                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Etiquetas</p>
                        <div className="space-y-2">
                            <div>
                                <label className="text-[9px] text-slate-600 uppercase tracking-widest font-bold block mb-1">Superior</label>
                                <input type="text" value={labels.top}
                                    onChange={e => setLabels(l => ({...l, top: e.target.value.toUpperCase()}))}
                                    className="w-full rounded-xl px-3 py-2 text-xs font-bold" />
                            </div>
                            <div>
                                <label className="text-[9px] text-slate-600 uppercase tracking-widest font-bold block mb-1">Inferior</label>
                                <input type="text" value={labels.bottom}
                                    onChange={e => setLabels(l => ({...l, bottom: e.target.value.toUpperCase()}))}
                                    className="w-full rounded-xl px-3 py-2 text-xs font-bold" />
                            </div>
                        </div>
                    </div>

                    {/* Controles */}
                    <div className="space-y-3">
                        <button onClick={togglePlay} disabled={!canPlay}
                            className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 disabled:opacity-30 disabled:cursor-not-allowed p-4 rounded-2xl font-bold text-sm transition-all active:scale-95">
                            {isPlaying
                                ? <><svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>Pausar</>
                                : <><svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>Previsualizar</>}
                        </button>

                        {!isRecording ? (
                            <button onClick={startRecording} disabled={!canRecord}
                                className="w-full flex items-center justify-center gap-2 bg-amber-600 hover:bg-amber-500 disabled:opacity-30 disabled:cursor-not-allowed p-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-amber-600/20">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                Exportar video
                            </button>
                        ) : (
                            <button onClick={stopRecording}
                                className="w-full flex items-center justify-center gap-3 bg-red-600 hover:bg-red-500 p-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-red-600/20">
                                <div className="w-3 h-3 bg-white rounded-full animate-pulse" />
                                Detener y descargar
                            </button>
                        )}

                        {recStatus && (
                            <p className="text-center text-[10px] text-amber-400 font-bold uppercase tracking-widest">{recStatus}</p>
                        )}
                    </div>

                    <p className="text-[9px] text-slate-700 font-bold uppercase tracking-widest text-center leading-relaxed">
                        Exporta en WebM 1080×1920.<br/>Convertible a MP4 con FFmpeg.
                    </p>
                </div>

                {/* Preview canvas */}
                <div className="flex-1 flex items-center justify-center">
                    <div style={{ position:'relative', borderRadius:32, overflow:'hidden', border:'1px solid rgba(255,255,255,0.06)', boxShadow:'0 30px 80px rgba(0,0,0,0.6)' }}>
                        {/* Glow superior */}
                        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(245,158,11,0.08), transparent 40%)', pointerEvents:'none', zIndex:1, borderRadius:32 }} />
                        <canvas ref={canvasRef} width={1080} height={1920}
                            style={{ width: 'auto', height: 'calc(100vh - 80px)', maxHeight: 800, aspectRatio:'9/16', display:'block', borderRadius:32 }} />
                    </div>
                </div>
            </main>

            {/* Videos ocultos como fuente */}
            <video ref={monRef}  src={monitorSrc || ''} loop muted playsInline crossOrigin="anonymous" style={{display:'none'}} />
            <video ref={ctrlRef} src={controlSrc  || ''} loop muted playsInline crossOrigin="anonymous" style={{display:'none'}} />
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

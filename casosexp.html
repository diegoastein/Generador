// ─── Canvas helpers ───────────────────────────────────────────────────────────
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    if (!text) return 0;
    const words = text.split(' ');
    let line = '', lines = [];
    for (let w of words) {
        const test = line ? line + ' ' + w : w;
        if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; }
        else line = test;
    }
    if (line) lines.push(line);
    for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], x, y + i * lineHeight);
    return lines.length;
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
}

// ─── Renderizado 1:1 (Post) ──────────────────────────────────
function renderSlideToCanvas(canvas, step, slideIndex) {
    if (!canvas || !step) return;
    try {
        const SIZE = 1080;
        canvas.width = SIZE;
        canvas.height = SIZE;
        const ctx = canvas.getContext('2d');

        // Fondo
        ctx.fillStyle = '#020617';
        ctx.fillRect(0, 0, SIZE, SIZE);

        // Patrón de puntos
        ctx.fillStyle = '#1e293b';
        for (let gx = 20; gx < SIZE; gx += 40) {
            for (let gy = 20; gy < SIZE; gy += 40) {
                ctx.beginPath();
                ctx.arc(gx, gy, 1, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        const PAD = 70;

        // Badge
        ctx.font = 'bold 26px Arial, sans-serif';
        ctx.fillStyle = '#2563eb';
        ctx.fillRect(PAD, PAD, 220, 55);
        ctx.fillStyle = '#fff';
        ctx.textBaseline = 'middle';
        ctx.fillText('CASO CLÍNICO', PAD + 20, PAD + 27);
        ctx.textBaseline = 'top';

        // Título — word-wrap basado en chars, máx 2 líneas, sin cortar palabras
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 66px Arial, sans-serif';
        const titleText = (step.t || 'Sin título').toUpperCase();
        const TITLE_MAX = 20; // chars por línea a 66px bold
        const titleWords = titleText.split(' ');
        const titleLineArr = [];
        let titleCur = '';
        for (const w of titleWords) {
            const test = titleCur ? titleCur + ' ' + w : w;
            if (test.length > TITLE_MAX && titleCur) {
                titleLineArr.push(titleCur);
                if (titleLineArr.length >= 2) break;
                titleCur = w.substring(0, TITLE_MAX);
            } else {
                titleCur = test;
            }
        }
        if (titleCur && titleLineArr.length < 2) titleLineArr.push(titleCur);
        titleLineArr.forEach((line, i) => ctx.fillText(line, PAD, PAD + 88 + i * 78));

        // Card — baja si hay 2 líneas de título para no solapar
        // título línea 2: top en PAD+88+78=236, bottom ≈236+66=302 → cardY debe ser >302
        const cardY = PAD + (titleLineArr.length > 1 ? 255 : 190);
        const cardH = step.v ? 490 : 340;
        const cardW = SIZE - PAD * 2;

        ctx.fillStyle = '#0f172a';
        ctx.fillRect(PAD, cardY, cardW, cardH);
        ctx.strokeStyle = 'rgba(255,255,255,0.07)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(PAD, cardY, cardW, cardH);

        const grd = ctx.createRadialGradient(PAD + 100, cardY + 100, 0, PAD + 100, cardY + 100, 400);
        grd.addColorStop(0, 'rgba(37,99,235,0.12)');
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.fillRect(PAD, cardY, cardW, cardH);

        // Descripción — word-wrap basado en chars, máx 3 líneas, sin cortar palabras
        ctx.fillStyle = '#e2e8f0';
        ctx.font = '400 36px Arial, sans-serif';
        ctx.textBaseline = 'top';
        ctx.textAlign = 'left';
        const DESC_MAX = 42; // chars por línea a 36px en 880px útiles
        const DESC_LINES = 3;
        const descWords = (step.d || '').split(' ');
        const descLineArr = [];
        let descCur = '';
        for (const w of descWords) {
            const test = descCur ? descCur + ' ' + w : w;
            if (test.length > DESC_MAX && descCur) {
                descLineArr.push(descCur);
                if (descLineArr.length >= DESC_LINES) break;
                descCur = w.substring(0, DESC_MAX);
            } else {
                descCur = test;
            }
        }
        if (descCur && descLineArr.length < DESC_LINES) descLineArr.push(descCur);
        // Agregar '…' si el texto fue cortado
        const descFull = step.d || '';
        if (descLineArr.join(' ').length < descFull.length - 2) {
            const last = descLineArr[descLineArr.length - 1];
            descLineArr[descLineArr.length - 1] = last.trimEnd() + '…';
        }
        const descLH = 52;
        descLineArr.forEach((line, i) => ctx.fillText(line, PAD + 30, cardY + 45 + i * descLH));

        // Vitales
        if (step.v) {
            const vy = cardY + cardH - 240;
            const colW = cardW / 2;

            if (step.v.hr !== null) {
                ctx.fillStyle = '#22c55e';
                ctx.font = 'bold 24px Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('FRECUENCIA CARDIACA', PAD + colW / 2, vy);
                ctx.font = 'bold 140px Arial, sans-serif';
                ctx.fillText(String(step.v.hr), PAD + colW / 2, vy + 50);
            }

            if (step.v.sp !== null) {
                ctx.fillStyle = '#facc15';
                ctx.font = 'bold 24px Arial, sans-serif';
                ctx.fillText('SATURACIÓN O₂', PAD + colW + colW / 2, vy);
                ctx.font = 'bold 140px Arial, sans-serif';
                ctx.fillText(String(step.v.sp) + '%', PAD + colW + colW / 2, vy + 50);
            }
            ctx.textAlign = 'left';
        }

        // Footer
        const fy = SIZE - 140;
        ctx.fillStyle = '#475569';
        ctx.font = 'bold 26px Arial, sans-serif';
        ctx.textBaseline = 'top';
        ctx.fillText('neomonitor.pro', PAD, fy);
        ctx.fillStyle = '#1e293b';
        ctx.font = 'bold 16px Arial, sans-serif';
        ctx.fillText('NRP 8ª · AHA/AAP 2023', PAD, fy + 35);

        // Número
        ctx.fillStyle = '#1e293b';
        ctx.font = 'bold 110px Arial, sans-serif';
        ctx.textBaseline = 'bottom';
        ctx.textAlign = 'right';
        ctx.fillText((slideIndex + 1) + '/5', SIZE - PAD, SIZE - PAD);
        ctx.textAlign = 'left';

    } catch (err) {
        console.error('Error en renderSlideToCanvas:', err);
        throw err;
    }
}

// ─── Renderizado 9:16 (Reel) ───────────────────────────────────────
function renderReelSlideToCanvas(canvas, step, slideIndex) {
    if (!canvas || !step) return;
    const W = 1080, H = 1920;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#020617'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#1e293b';
    for (let gx=30; gx<W; gx+=60) for (let gy=30; gy<H; gy+=60) {
        ctx.beginPath(); ctx.arc(gx,gy,1.5,0,Math.PI*2); ctx.fill();
    }
    const PAD = 100;

    // Badge
    ctx.fillStyle='#2563eb';
    roundRect(ctx, W/2 - 120, PAD, 240, 70, 35);
    ctx.fill();
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold 32px Arial, sans-serif';
    ctx.fillText('CASO CLÍNICO', W/2, PAD+35);
    ctx.textBaseline='top'; ctx.textAlign='left';

    // Título
    const titleY = PAD + 180;
    ctx.fillStyle='#fff'; ctx.font='bold 96px Arial, sans-serif'; ctx.textAlign='center';
    const titleText = (step.t||'Sin título').toUpperCase().substring(0, 30);
    ctx.fillText(titleText, W/2, titleY);
    ctx.textAlign='left';

    // Card
    const cardY = titleY + 140;
    const cardW = W - PAD*2, cardH = 750;
    roundRect(ctx, PAD, cardY, cardW, cardH, 80); ctx.fillStyle='#0f172a'; ctx.fill();
    roundRect(ctx, PAD, cardY, cardW, cardH, 80); ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=2; ctx.stroke();
    const grd = ctx.createRadialGradient(W/2, cardY+200, 0, W/2, cardY+200, 500);
    grd.addColorStop(0,'rgba(37,99,235,0.15)'); grd.addColorStop(1,'transparent');
    roundRect(ctx, PAD, cardY, cardW, cardH, 80); ctx.fillStyle=grd; ctx.fill();

    // Descripción
    ctx.fillStyle='#e2e8f0'; ctx.font='400 34px Arial, sans-serif'; ctx.textAlign='center';
    let descReel = (step.d || '').substring(0, 45);
    if (descReel.length === 45 && step.d.length > 45) {
        descReel = descReel.trim() + '…';
    }
    ctx.fillText(descReel, W/2, cardY+100);
    ctx.textAlign='left';

    // Vitales
    if (step.v) {
        const vy = cardY + 450, colW = cardW / 2;
        if (step.v.hr !== null) {
            ctx.fillStyle='#22c55e'; ctx.font='bold 28px Arial, sans-serif'; ctx.textAlign='center';
            ctx.fillText('FRECUENCIA CARDIACA', PAD + colW/2, vy);
            ctx.font='bold 160px Arial, sans-serif'; ctx.fillText(String(step.v.hr), PAD + colW/2, vy+50);
        }
        if (step.v.sp !== null) {
            ctx.fillStyle='#facc15'; ctx.font='bold 28px Arial, sans-serif'; ctx.textAlign='center';
            ctx.fillText('SATURACIÓN O₂', PAD + colW + colW/2, vy);
            ctx.font='bold 160px Arial, sans-serif'; ctx.fillText(String(step.v.sp)+'%', PAD + colW + colW/2, vy+50);
        }
        ctx.textAlign='left';
    }

    // Footer
    const fy = H - 200;
    ctx.fillStyle='#475569'; ctx.font='bold 36px Arial, sans-serif'; ctx.textAlign='center';
    ctx.fillText('neomonitor.pro', W/2, fy);
    ctx.fillStyle='#1e293b'; ctx.font='bold 24px Arial, sans-serif';
    ctx.fillText('NRP · SIMULACIÓN MÉDICA', W/2, fy+50);

    // Número de slide
    ctx.font='bold 140px Arial, sans-serif'; ctx.fillStyle='#1e293b';
    ctx.textAlign='right'; ctx.textBaseline='bottom';
    ctx.fillText((slideIndex+1)+'/5', W - PAD, H - PAD);
    ctx.textAlign='left';
}

function renderReelCTASlide(canvas, cta) {
    const W = 1080, H = 1920;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#020617'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#1e293b';
    for (let gx=30; gx<W; gx+=60) for (let gy=30; gy<H; gy+=60) {
        ctx.beginPath(); ctx.arc(gx,gy,1.5,0,Math.PI*2); ctx.fill();
    }
    const grd = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,900);
    grd.addColorStop(0,'rgba(37,99,235,0.18)'); grd.addColorStop(1,'transparent');
    ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
    const PAD = 100, cx = W/2;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';

    // Logo NM
    roundRect(ctx,cx-60,PAD,120,120,28); ctx.fillStyle='#2563eb'; ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 48px Arial, sans-serif';
    ctx.textBaseline='middle'; ctx.fillText('NM',cx,PAD+60); ctx.textBaseline='top';

    // Tag (ej: "PARA TUS CLASES Y RESIDENTES")
    ctx.fillStyle='#22c55e'; ctx.font='bold 36px Arial, sans-serif';
    ctx.fillText(cta.tag,cx,PAD+168);

    // Headline (ej: "Visitá NeoMonitor")
    ctx.fillStyle='#fff'; ctx.font='bold 128px Arial, sans-serif';
    let headlineText = (cta.headline.toUpperCase() || '').substring(0, 20);
    ctx.fillText(headlineText, cx, PAD+244);

    // Descripción (ej: "Ingresá a www.neomonitor.pro...")
    const subY = PAD+400;
    ctx.fillStyle='#94a3b8'; ctx.font='400 48px Arial, sans-serif';
    let subText = (cta.sub || '').substring(0, 40);
    if (subText.length === 40 && cta.sub.length > 40) {
        subText = subText.trim() + '…';
    }
    ctx.fillText(subText, cx, subY);

    // URL button
    const urlY = H-260;
    roundRect(ctx,PAD,urlY,W-PAD*2,130,65); ctx.fillStyle='#2563eb'; ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 58px Arial, sans-serif';
    ctx.textBaseline='middle'; ctx.fillText('WWW.NEOMONITOR.PRO',cx,urlY+65);

    // Footer
    ctx.fillStyle='#334155'; ctx.font='bold 30px Arial, sans-serif';
    ctx.textBaseline='top'; ctx.fillText('NEOMONITOR EXPERT SUITE',cx,H-108);
    ctx.textAlign='left'; ctx.textBaseline='top';
}

// ─── Generar audio por defecto ─────────────────────────────────────────────
const generateDefaultAudio = () => {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const sampleRate = ctx.sampleRate;
    const duration = 35; // 35 segundos
    const totalSamples = duration * sampleRate;
    const buffer = ctx.createBuffer(1, totalSamples, sampleRate);
    const channel = buffer.getChannelData(0);

    // Generar tono suave (220 Hz - nota A3)
    const freq = 220;
    for (let i = 0; i < totalSamples; i++) {
        const t = i / sampleRate;
        const wave = Math.sin(2 * Math.PI * freq * t);
        // Envolvente suave para evitar clics
        const envelope = Math.sin(Math.PI * (t / duration)) * 0.4;
        channel[i] = wave * envelope;
    }

    const offlineCtx = new OfflineAudioContext(1, totalSamples, sampleRate);
    const offlineBuffer = offlineCtx.createBuffer(1, totalSamples, sampleRate);
    offlineBuffer.getChannelData(0).set(channel);

    // Convertir a WAV y luego a blob
    const wav = encodeWAV(offlineBuffer);
    return new Blob([wav], { type: 'audio/wav' });
};

const encodeWAV = (buffer) => {
    const channelData = buffer.getChannelData(0);
    const sampleRate = buffer.sampleRate;
    const frameLength = channelData.length;
    const numberOfChannels = 1;
    const format = 1; // PCM
    const bitDepth = 16;

    const bytesPerSample = bitDepth / 8;
    const blockAlign = numberOfChannels * bytesPerSample;

    const audioData = new Float32Array(frameLength);
    for (let i = 0; i < frameLength; i++) {
        audioData[i] = channelData[i];
    }

    const dataLength = frameLength * numberOfChannels * bytesPerSample;
    const buffer32 = new ArrayBuffer(44 + dataLength);
    const view = new DataView(buffer32);

    const writeString = (offset, string) => {
        for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
        }
    };

    writeString(0, 'RIFF');
    view.setUint32(4, 36 + dataLength, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, format, true);
    view.setUint16(22, numberOfChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * blockAlign, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitDepth, true);
    writeString(36, 'data');
    view.setUint32(40, dataLength, true);

    let offset = 44;
    for (let i = 0; i < frameLength; i++) {
        const s = Math.max(-1, Math.min(1, audioData[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        offset += 2;
    }

    return buffer32;
};

            const canvas = document.createElement('canvas');

            const mimeType = [
                'video/mp4;codecs="avc1.42E01E,mp4a.40.2"',
                'video/mp4',
                'video/webm;codecs=vp9',
                'video/webm;codecs=vp8',

            ].find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';

            let recordStream = videoStream;

            // Solo usar archivos cargados localmente para grabar (evita problemas CORS)
            if (audioObjectUrl) {
                try {
                    setStatus('Cargando audio...');
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    audioEl = new Audio(audioObjectUrl);

                    await new Promise((resolve, reject) => {

                    const src = audioCtx.createMediaElementSource(audioEl);
                    const dest = audioCtx.createMediaStreamDestination();
                    const gain = audioCtx.createGain();
                    gain.gain.value = 0.85;
                    src.connect(gain);
                    gain.connect(dest);
                    gain.connect(audioCtx.destination);

                    recordStream = new MediaStream([

            const recorder = new MediaRecorder(recordStream, { mimeType, videoBitsPerSecond: 8000000 });
            const chunks = [];
            recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };

            recorder.onstop = () => {
                if (audioEl?.pause) audioEl.pause();
                if (audioCtx) audioCtx.close();
                const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';

            } catch (err) {
                reject(err);
            }
        });

    const batchGenerateCases = async () => {
        const lines = batchDescriptions.trim().split('\n').filter(l => l.trim());
        if (lines.length === 0) {
            alert('Por favor, escribe al menos un tema');
            return;
        }

        let apiKey = localStorage.getItem('claude_api_key');
        if (!apiKey) {
            apiKey = prompt('Ingresá tu API key de Claude (sk-ant-...):');
            if (!apiKey) {
                alert('Se requiere API key');
                return;
            }
            localStorage.setItem('claude_api_key', apiKey);
        }

        setIsBatchGenerating(true);
        const zip = new JSZip();
        let successCount = 0;

        for (let i = 0; i < lines.length; i++) {
            const description = lines[i].trim();
            const folderName = description.replace(/[^a-z0-9]/gi, '_').substring(0, 50);

            setBatchProgress(`${i + 1}/${lines.length} - Generando: ${description.substring(0, 40)}`);

            try {
                const response = await fetch('/api/generate-case', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey, caseDescription: description })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'Error en Claude');
                }

                const data = await response.json();
                let jsonStr = data.content[0].text.trim();
                if (jsonStr.startsWith('```json')) {
                    jsonStr = jsonStr.replace(/^```json\n/, '').replace(/\n```$/, '');
                } else if (jsonStr.startsWith('```')) {
                    jsonStr = jsonStr.replace(/^```\n/, '').replace(/\n```$/, '');
                }

                const caseData = JSON.parse(jsonStr);
                const formattedSteps = caseData.steps.map(s => ({
                    t: s.title || '',
                    d: s.description || '',
                    v: (s.hr !== null || s.spo2 !== null) ? { hr: s.hr, sp: s.spo2 } : null
                }));

                const folder = zip.folder(folderName);

                // Generar Carruseles (PNGs)
                if (batchFormat === 'carruseles' || batchFormat === 'ambos') {
                    setBatchProgress(`${i + 1}/${lines.length} - Renderizando carruseles de ${description.substring(0, 40)}`);
                    const carruselFolder = folder.folder('carruseles');
                    for (let j = 0; j < 5; j++) {
                        const canvas = document.createElement('canvas');
                        renderSlideToCanvas(canvas, formattedSteps[j], j);
                        const dataUrl = canvas.toDataURL('image/png');
                        const base64 = dataUrl.replace(/^data:image\/png;base64,/, '');
                        const slideTitle = sanitizeFileName(formattedSteps[j].t || `slide_${j + 1}`, 40);
                        carruselFolder.file(`${j + 1}_${slideTitle}.png`, base64, { base64: true });
                    }
                }

                // Generar Reels (MP4 o WebM)
                if (batchFormat === 'reels' || batchFormat === 'ambos') {
                    setBatchProgress(`${i + 1}/${lines.length} - Grabando reel de ${description.substring(0, 40)}`);
                    try {
                        const { blob: reelBlob, ext: reelExt } = await generateReelBlob(formattedSteps, caseData.title);
                        const reelFolder = folder.folder('reels');
                        const reelBase64 = await new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onload = () => {
                                resolve(reader.result.split(',')[1]);
                            };
                            reader.onerror = reject;
                            reader.readAsDataURL(reelBlob);
                        });
                        const reelTitle = sanitizeFileName(caseData.title || description, 50);
                        reelFolder.file(`reel_${reelTitle}_9-16.${reelExt}`, reelBase64, { base64: true });
                    } catch (reelErr) {
                        console.warn(`Error generando reel para "${description}":`, reelErr);
                        setBatchProgress(`${i + 1}/${lines.length} - ⚠️ Reel falló, continuando...`);
                    }
                }

                successCount++;
                // Pequeña pausa entre casos
                await new Promise(r => setTimeout(r, 500));
            } catch (err) {
                console.error(`Error en "${description}":`, err);
                setBatchProgress(`${i + 1}/${lines.length} - ❌ Error: ${err.message}`);
                await new Promise(r => setTimeout(r, 1000));
            }
        }

        // Descargar ZIP
        if (successCount > 0) {
            setBatchProgress(`Empaquetando ${successCount} casos...`);
            zip.generateAsync({ type: 'blob' }).then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const fileName = `NeoMonitor_Batch_${new Date().toISOString().split('T')[0]}.zip`;
                a.download = fileName;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 1000);
                setBatchProgress(`✅ ${successCount}/${lines.length} casos descargados`);
                setTimeout(() => {
                    setIsBatchGenerating(false);
                    setBatchProgress('');
                }, 2000);
            });
        } else {
            alert('No se generó ningún caso');
            setIsBatchGenerating(false);
            setBatchProgress('');
        }

                        <div className="border-2 border-dashed border-slate-800 rounded-[40px] aspect-square flex flex-col items-center justify-center text-slate-700 p-12 text-center">
                            <p className="text-sm font-bold uppercase tracking-widest leading-relaxed">📚 Tu biblioteca está vacía</p>
                            <p className="text-xs text-slate-600 mt-2">Genera carruseles o reels para verlos aquí</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 fade-in">
                            {library.map(item => (
                                <div key={item.id} className="glass-card rounded-2xl p-4 flex flex-col gap-3 border border-white/10">
                                    <div>
                                        <p className="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-1">Título</p>
                                        <p className="text-sm font-bold text-white truncate">{item.title}</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 text-[10px]">
                                        <div>
                                            <p className="text-slate-600 uppercase font-black tracking-widest mb-1">Tipo</p>
                                            <span className={`px-2 py-1 rounded font-bold ${item.type === 'Carrusel' ? 'bg-blue-600/30 text-blue-300' : 'bg-purple-600/30 text-purple-300'}`}>{item.type}</span>
                                        </div>
                                        <div>
                                            <p className="text-slate-600 uppercase font-black tracking-widest mb-1">Fecha</p>
                                            <p className="text-slate-400 text-[9px]">{item.dateTime.split(',')[0]}</p>
                                        </div>
                                    </div>
                                    <div>
                                        <p className="text-[9px] text-slate-600 uppercase font-black tracking-widest mb-1">Audio</p>
                                        <p className="text-[9px] text-slate-400 truncate">{item.audio}</p>
                                    </div>
                                    <div>
                                        <p className="text-[9px] text-slate-600 uppercase font-black tracking-widest mb-2">Estado</p>
                                        <select
                                            value={item.status}
                                            onChange={(e) => updateLibraryItem(item.id, { status: e.target.value })}
                                            className="w-full text-[9px] font-bold px-2 py-1 rounded bg-slate-800 border border-white/10 text-white cursor-pointer"
                                        >
                                            <option value="Borrador">Borrador</option>
                                            <option value="Listo">Listo</option>
                                            <option value="Publicado">Publicado</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-2 pt-2 border-t border-white/5">
                                        <button
                                            onClick={() => regenerateFromLibrary(item)}
                                            className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold text-[9px] py-2 rounded transition-all uppercase tracking-widest"
                                        >
                                            ↻ Recargar
                                        </button>
                                        <button
                                            onClick={() => {
                                                if (confirm('¿Eliminar de la biblioteca?')) deleteLibraryItem(item.id);
                                            }}
                                            className="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold text-[9px] py-2 rounded transition-all uppercase tracking-widest"
                                        >
                                            ✕ Borrar
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
                )}
            </main>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

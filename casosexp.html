// ─── Canvas helpers ───────────────────────────────────────────────────────────
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    if (!text) return 0;
    const words = text.split(' ');
    let line = '', lines = [];
    for (let w of words) {
        const test = line ? line + ' ' + w : w;
        if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; }
        else line = test;
    }
    if (line) lines.push(line);
    for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], x, y + i * lineHeight);
    return lines.length;
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
}

// ─── Renderizado 1:1 (Post) ──────────────────────────────────
function renderSlideToCanvas(canvas, step, slideIndex) {
    if (!canvas || !step) return;
    const SIZE = 1080;
    canvas.width = SIZE; canvas.height = SIZE;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#020617'; ctx.fillRect(0,0,SIZE,SIZE);
    ctx.fillStyle = '#1e293b';
    for (let gx=20; gx<SIZE; gx+=40) for (let gy=20; gy<SIZE; gy+=40) {
        ctx.beginPath(); ctx.arc(gx,gy,1,0,Math.PI*2); ctx.fill();
    }
    const PAD = 80;
    ctx.font = 'bold 28px Inter, sans-serif';
    const badgeText = 'CASO CLÍNICO';
    const bw = ctx.measureText(badgeText).width + 60;
    roundRect(ctx, PAD, PAD, bw, 60, 30); ctx.fillStyle='#2563eb'; ctx.fill();
    ctx.fillStyle='#fff'; ctx.textBaseline='middle'; ctx.fillText(badgeText, PAD+30, PAD+30); ctx.textBaseline='top';
    const titleY = PAD+90;
    ctx.fillStyle='#fff'; ctx.font='bold 88px Inter, sans-serif'; ctx.textBaseline='top';
    const tl = wrapText(ctx, (step.t||'Sin título').toUpperCase(), PAD, titleY, SIZE-PAD*2, 92);
    const cardY = titleY + tl*92 + 32;
    const cardH = step.v ? 460 : 320;
    const cardW = SIZE - PAD*2;
    roundRect(ctx, PAD, cardY, cardW, cardH, 60); ctx.fillStyle='#0f172a'; ctx.fill();
    roundRect(ctx, PAD, cardY, cardW, cardH, 60); ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1.5; ctx.stroke();
    const grd = ctx.createRadialGradient(PAD+100,cardY+100,0,PAD+100,cardY+100,400);
    grd.addColorStop(0,'rgba(37,99,235,0.12)'); grd.addColorStop(1,'transparent');
    roundRect(ctx, PAD, cardY, cardW, cardH, 60); ctx.fillStyle=grd; ctx.fill();
    ctx.fillStyle='#e2e8f0'; ctx.font='400 42px Inter, sans-serif'; ctx.textBaseline='top';
    wrapText(ctx, step.d||'', PAD+60, cardY+60, cardW-120, 58);
    if (step.v) {
        const vy = cardY + cardH - 220; 
        if (step.v.hr !== null) {
            ctx.fillStyle='#22c55e'; ctx.font='bold 22px Inter, sans-serif'; ctx.textBaseline='top';
            ctx.fillText('FRECUENCIA CARDIACA', PAD+60, vy);
            ctx.font='bold 110px Inter, sans-serif'; ctx.fillText(String(step.v.hr), PAD+60, vy+35);
        }
        if (step.v.sp !== null) {
            ctx.fillStyle='#facc15'; ctx.font='bold 22px Inter, sans-serif';
            ctx.fillText('SATURACIÓN O₂', PAD+60+380, vy);
            ctx.font='bold 110px Inter, sans-serif'; ctx.fillText(String(step.v.sp), PAD+60+380, vy+35);
            ctx.font='bold 50px Inter, sans-serif';
            ctx.fillText('%', PAD+60+380+ctx.measureText(String(step.v.sp)).width+8, vy+85);
        }
    }
    const fy = SIZE-PAD-60;
    ctx.fillStyle='#475569'; ctx.font='bold 28px Inter, sans-serif'; ctx.textBaseline='top';
    ctx.fillText('neomonitor.pro', PAD+10, fy);
    ctx.fillStyle='#1e293b'; ctx.font='bold 18px Inter, sans-serif';
    ctx.fillText('NRP · AHA/AAP 8ª EDICIÓN', PAD+10, fy+38);
    ctx.fillStyle='#1e293b'; ctx.font='bold 120px Inter, sans-serif';
    ctx.textBaseline='bottom'; ctx.textAlign='right';
    ctx.fillText((slideIndex+1)+'/5', SIZE-PAD, SIZE-PAD+20);
    ctx.textAlign='left'; ctx.textBaseline='top';
}

// ─── Renderizado 9:16 (Reel) ───────────────────────────────────────
function renderReelSlideToCanvas(canvas, step, slideIndex) {
    if (!canvas || !step) return;
    const W = 1080, H = 1920;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#020617'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#1e293b';
    for (let gx=30; gx<W; gx+=60) for (let gy=30; gy<H; gy+=60) {
        ctx.beginPath(); ctx.arc(gx,gy,1.5,0,Math.PI*2); ctx.fill();
    }
    const PAD = 100;
    const badgeText = 'CASO CLÍNICO';
    ctx.font = 'bold 32px Inter, sans-serif';
    const bw = ctx.measureText(badgeText).width + 70;
    roundRect(ctx, W/2 - bw/2, PAD, bw, 70, 35); ctx.fillStyle='#2563eb'; ctx.fill();
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle'; 
    ctx.fillText(badgeText, W/2, PAD+35); ctx.textBaseline='top'; ctx.textAlign='left';
    const titleY = PAD + 180;
    ctx.fillStyle='#fff'; ctx.font='bold 96px Inter, sans-serif'; ctx.textAlign='center';
    const tl = wrapText(ctx, (step.t||'Sin título').toUpperCase(), W/2, titleY, W-PAD*2, 105);
    ctx.textAlign='left';
    const cardY = titleY + tl*105 + 80;
    const cardW = W - PAD*2, cardH = 750;
    roundRect(ctx, PAD, cardY, cardW, cardH, 80); ctx.fillStyle='#0f172a'; ctx.fill();
    roundRect(ctx, PAD, cardY, cardW, cardH, 80); ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=2; ctx.stroke();
    const grd = ctx.createRadialGradient(W/2, cardY+200, 0, W/2, cardY+200, 500);
    grd.addColorStop(0,'rgba(37,99,235,0.15)'); grd.addColorStop(1,'transparent');
    roundRect(ctx, PAD, cardY, cardW, cardH, 80); ctx.fillStyle=grd; ctx.fill();
    ctx.fillStyle='#e2e8f0'; ctx.font='400 48px Inter, sans-serif'; ctx.textAlign='center';
    wrapText(ctx, step.d||'', W/2, cardY+100, cardW-160, 68);
    ctx.textAlign='left';
    if (step.v) {
        const vy = cardY + 450, colW = cardW / 2;
        if (step.v.hr !== null) {
            ctx.fillStyle='#22c55e'; ctx.font='bold 28px Inter, sans-serif'; ctx.textAlign='center';
            ctx.fillText('FRECUENCIA CARDIACA', PAD + colW/2, vy);
            ctx.font='bold 160px Inter, sans-serif'; ctx.fillText(String(step.v.hr), PAD + colW/2, vy+50);
        }
        if (step.v.sp !== null) {
            ctx.fillStyle='#facc15'; ctx.font='bold 28px Inter, sans-serif'; ctx.textAlign='center';
            ctx.fillText('SATURACIÓN O₂', PAD + colW + colW/2, vy);
            ctx.font='bold 160px Inter, sans-serif'; ctx.fillText(String(step.v.sp)+'%', PAD + colW + colW/2, vy+50);
        }
        ctx.textAlign='left';
    }
    const fy = H - 200;
    ctx.fillStyle='#475569'; ctx.font='bold 36px Inter, sans-serif'; ctx.textAlign='center';
    ctx.fillText('neomonitor.pro', W/2, fy);
    ctx.fillStyle='#1e293b'; ctx.font='bold 24px Inter, sans-serif';
    ctx.fillText('NRP · SIMULACIÓN MÉDICA', W/2, fy+50);
    ctx.font='bold 140px Inter, sans-serif'; ctx.fillStyle='#1e293b';
    ctx.fillText((slideIndex+1)+'/5', W/2, H - PAD);
}

// ─── Componente Preview ──────────────────────────────────────────────────────────
const SlidePreview = ({ step, index }) => {
    const canvasRef = useRef(null);
    useEffect(() => {
        if (canvasRef.current && step) {
            renderSlideToCanvas(canvasRef.current, step, index);
        }
    }, [step, index]);

    return (
        <div className="w-full aspect-square bg-slate-950 rounded-2xl overflow-hidden border border-white/5 shadow-2xl">
            <canvas ref={canvasRef} className="w-full h-full object-contain" />
        </div>
    );
};

const App = () => {
    const [activeSlide, setActiveSlide] = useState(0);
    const [slideDuration, setSlideDuration] = useState(3);
    const [scenario, setScenario] = useState({
        title: "Nuevo Escenario",
        steps: Array(5).fill(null).map(() => ({ t:"", d:"", v:null }))
    });
    const [isGenerating, setIsGenerating] = useState(false);
    const [isExportingVideo, setIsExportingVideo] = useState(false);
    const [gallery, setGallery] = useState([]);
    const [status, setStatus] = useState('');

    const loadScenario = (key) => {
        if (!key) return;
        const base = SCENARIOS_BASE[key];
        setScenario({ title: base.title, steps: JSON.parse(JSON.stringify(base.steps)) });
        setActiveSlide(0); setGallery([]);
    };

    const updateSlide = (field, value) => {
        const newSteps = [...scenario.steps];
        if (field==='hr'||field==='sp') {
            if (!newSteps[activeSlide].v) newSteps[activeSlide].v = { hr:"", sp:"" };
            newSteps[activeSlide].v[field] = value;
        } else newSteps[activeSlide][field] = value;
        setScenario({...scenario, steps: newSteps});
    };

    const generateImages = async () => {
        setIsGenerating(true); setGallery([]);
        const images = [];
        for (let i=0; i<5; i++) {
            setStatus('Generando '+(i+1)+'/5…');
            await new Promise(r => setTimeout(r, 60));
            const canvas = document.createElement('canvas');
            renderSlideToCanvas(canvas, scenario.steps[i], i);
            images.push(canvas.toDataURL('image/png'));
        }
        setGallery(images); setStatus(''); setIsGenerating(false);
    };

    const exportVideo = async () => {
        if (isExportingVideo) return;
        setIsExportingVideo(true);
        setStatus('Preparando...');
        
        try {
            const canvas = document.createElement('canvas');
            canvas.width = 1080; canvas.height = 1920;
            const stream = canvas.captureStream(30); 
            const mimeType = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm']
                .find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
                
            const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8000000 });
            const chunks = [];
            recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url;
                a.download = `NeoMonitor_Reel_${scenario.title.replace(/\s+/g, '_')}.webm`;
                a.click();
                setTimeout(() => window.URL.revokeObjectURL(url), 1000);
                setIsExportingVideo(false); setStatus('');
            };
            
            recorder.start();
            await new Promise(r => setTimeout(r, 400));

            for (let i = 0; i < 5; i++) {
                setStatus(`Grabando Diapositiva ${i+1}/5...`);
                // Renderizado activo durante el tiempo de la diapositiva para evitar que el encoder se salte frames
                const slideStartTime = Date.now();
                const totalDuration = slideDuration * 1000;
                
                while (Date.now() - slideStartTime < totalDuration) {
                    renderReelSlideToCanvas(canvas, scenario.steps[i], i);
                    // Usar rAF para sincronizar con el refresco del navegador
                    await new Promise(r => requestAnimationFrame(r));
                }
            }
            
            await new Promise(r => setTimeout(r, 300));
            recorder.stop();
        } catch (err) {
            console.error(err);
            setIsExportingVideo(false); setStatus('Error');
        }
    };

    const currentStep = scenario.steps[activeSlide];

    return (
        <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col md:flex-row overflow-hidden">
            <aside className="w-full md:w-72 bg-slate-900/50 border-r border-white/5 p-6 flex flex-col items-center md:items-start shrink-0">
                <div className="flex items-center gap-3 mb-12">
                    <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-blue-500/40">NM</div>
                    <span className="font-black text-xl tracking-tighter uppercase">Expert Suite</span>
                </div>
                <nav className="w-full space-y-2">
                    <div className="p-4 rounded-2xl bg-blue-600/10 border border-blue-500/30 flex items-center gap-4 text-blue-400">
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                        <span className="font-bold text-sm">Casos 1:1 Post</span>
                    </div>
                </nav>
                <div className="mt-6 w-full p-3 rounded-xl bg-blue-950/40 border border-blue-900/40">
                    <p className="text-[9px] text-blue-400 font-bold uppercase tracking-widest leading-relaxed">Basado en NRP<br/>AHA/AAP 8ª Ed. 2021<br/>+ Actualización 2023</p>
                </div>
                <div className="mt-auto hidden md:block pt-8 border-t border-white/5 w-full">
                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Editor de Contenido v4.3</p>
                </div>
            </aside>

            <main className="flex-1 p-6 md:p-12 overflow-y-auto">
                <header className="mb-10 max-w-6xl mx-auto">
                    <div className="flex flex-col md:flex-row md:items-center gap-4 mb-2">
                        <h2 className="text-4xl font-black tracking-tight uppercase">Editor de <span className="text-blue-500">Casos</span></h2>
                        <div className="bg-blue-500/20 text-blue-500 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase inline-block w-fit">NRP Experts</div>
                    </div>
                    <p className="text-slate-400">Diseña posts e Instagram Reels con fidelidad técnica.</p>
                </header>

                <div className="grid lg:grid-cols-12 gap-8 max-w-6xl mx-auto items-start">
                    <div className="lg:col-span-5 space-y-6">
                        
                        <SlidePreview step={currentStep} index={activeSlide}/>

                        <div className="glass-card p-6 rounded-[32px] space-y-6">
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Escenario Maestro</label>
                                <select onChange={e=>loadScenario(e.target.value)} className="w-full rounded-xl p-4 text-sm font-bold cursor-pointer">
                                    <option value="">-- Nuevo Documento --</option>
                                    <optgroup label="─ Casos Originales ─">
                                        <option value="brady">Bradicardia Severa</option>
                                        <option value="pneumo">Neumotórax a Tensión</option>
                                        <option value="sepsis">Shock Séptico Neonatal</option>
                                    </optgroup>
                                    <optgroup label="─ Nuevos NRP 8ª Ed. ─">
                                        <option value="apnea_primaria">Apnea Primaria al Nacer</option>
                                        <option value="vpp_inefectiva">VPP Inefectiva — MR-SOPA</option>
                                        <option value="aspiracion_meconio">Líquido Amniótico Meconial</option>
                                        <option value="comprensiones_cardiacas">Compresiones Cardíacas Neonatales</option>
                                        <option value="epinefrina_neonatal">Epinefrina en Reanimación</option>
                                        <option value="prematuro_extremo">Prematuro Extremo &lt; 28 sem</option>
                                        <option value="hernia_diafragmatica">Hernia Diafragmática Congénita</option>
                                        <option value="hipoglucemia_neonatal">Hipoglucemia Neonatal Severa</option>
                                        <option value="encefalopatia_hipoxica">Encefalopatía Hipóxico-Isquémica</option>
                                        <option value="hipertension_pulmonar">Hipertensión Pulmonar Neonatal</option>
                                    </optgroup>
                                </select>
                            </div>

                            <div className="space-y-4 pt-4 border-t border-white/5">
                                <div className="flex bg-slate-950 rounded-xl p-1">
                                    {[0,1,2,3,4].map(i=>(
                                        <button key={i} onClick={()=>setActiveSlide(i)}
                                            className={'flex-1 py-3 text-[10px] font-black uppercase rounded-lg transition-all '+(activeSlide===i?'active-tab':'text-slate-500 hover:text-slate-300')}>S{i+1}</button>
                                    ))}
                                </div>
                                <input type="text" placeholder="Título" value={currentStep?.t || ""} onChange={e=>updateSlide('t',e.target.value)} className="w-full rounded-xl p-4 text-sm font-bold"/>
                                <textarea placeholder="Descripción..." rows={4} value={currentStep?.d || ""} onChange={e=>updateSlide('d',e.target.value)} className="w-full rounded-xl p-4 text-sm resize-none"/>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-[9px] font-bold text-slate-600 uppercase ml-1 tracking-widest">FC (bpm)</label>
                                        <input type="text" placeholder="--" value={currentStep?.v?.hr||""} onChange={e=>updateSlide('hr',e.target.value)} className="w-full rounded-xl p-4 text-sm font-black text-green-500 text-center"/>
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-bold text-slate-600 uppercase ml-1 tracking-widest">SpO₂ (%)</label>
                                        <input type="text" placeholder="--" value={currentStep?.v?.sp||""} onChange={e=>updateSlide('sp',e.target.value)} className="w-full rounded-xl p-4 text-sm font-black text-yellow-500 text-center"/>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-3">
                                <button onClick={generateImages} disabled={isGenerating || isExportingVideo}
                                    className="w-full bg-slate-800 hover:bg-slate-700 disabled:opacity-50 text-white font-black py-4 rounded-2xl transition-all flex items-center justify-center gap-3 uppercase tracking-widest text-[10px]">
                                    {isGenerating ? <span>{status}</span> : <span>Generar Carrusel 1:1</span>}
                                </button>
                                
                                <div className="pt-4 border-t border-white/5 space-y-3">
                                    <div className="flex items-center justify-between">
                                        <label className="text-[10px] font-black text-amber-500 uppercase tracking-widest">Velocidad Reel</label>
                                        <div className="flex items-center gap-2">
                                            <select value={slideDuration} onChange={e=>setSlideDuration(parseInt(e.target.value))} className="bg-slate-950 rounded-lg px-2 py-1 text-xs font-bold border border-white/10">
                                                {[2,3,4,5,6,8,10].map(v => <option key={v} value={v}>{v}s</option>)}
                                            </select>
                                            <span className="text-[10px] text-slate-500 font-bold uppercase">por slide</span>
                                        </div>
                                    </div>
                                    
                                    <button onClick={exportVideo} disabled={isGenerating || isExportingVideo}
                                        className="w-full bg-amber-600 hover:bg-amber-500 disabled:opacity-50 text-white font-black py-5 rounded-2xl shadow-xl shadow-amber-600/20 transition-all flex items-center justify-center gap-3 uppercase tracking-widest text-xs">
                                        {isExportingVideo ? <><div className="w-2 h-2 bg-white rounded-full recording-dot"/><span>{status}</span></> : <span>Exportar Video Reel 9:16</span>}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="lg:col-span-7">
                        {gallery.length > 0
                            ? <div className="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">
                                {gallery.map((img,i) => (
                                    <div key={i} className="group relative rounded-3xl border border-white/5 overflow-hidden shadow-2xl hover:scale-[1.02] transition-all">
                                        <img src={img} alt={'Slide '+(i+1)} className="w-full aspect-square object-cover"/>
                                        <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all duration-300">
                                            <a href={img} download={'NeoMonitor_Post_'+(i+1)+'.png'} className="bg-white text-black p-4 rounded-full shadow-2xl">
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                            </a>
                                        </div>
                                        <div className="absolute top-4 right-4 bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">POST {i+1}</div>
                                    </div>
                                ))}
                              </div>
                            : <div className="border-2 border-dashed border-slate-800 rounded-[40px] aspect-square flex flex-col items-center justify-center text-slate-700 p-12 text-center">
                                <p className="text-xs font-bold uppercase tracking-widest leading-relaxed">Personaliza tu caso y elige el formato de exportación para tu red social preferida.</p>
                              </div>}
                    </div>
                </div>
            </main>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
